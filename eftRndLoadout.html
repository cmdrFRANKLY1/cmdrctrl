<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarkov Standalone Loadout Generator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ==========================================================================
       GLOBAL CSS VARIABLES & THEME
       ========================================================================== */
    :root {
      --app-bg: #050505;
      --panel-bg: #0b0b0b;
      --panel-border: #1a1a1a;
      --header-bg: #111111;
      --header-text: #ffffff;
      --accent: #ca8a04;
      --accent-hover: #e0a010;
      --text-primary: #cccccc;
      --text-secondary: #666666;
      --tile-bg: #111111;
      --tile-hover: #161616;
      --border-radius: 12px;
      --card-radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--app-bg);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      background-image: radial-gradient(circle at 50% 0%, #111111 0%, #050505 100%);
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    /* Helper Utilities */
    .hidden { display: none !important; }

    /* ==========================================================================
       HEADER STYLE
       ========================================================================== */
    header {
      background: var(--header-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--border-radius);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-group i {
      font-size: 32px;
      color: var(--accent);
    }

    .title-group h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1.5px;
      color: var(--header-text);
      text-transform: uppercase;
    }

    .title-group h1 span {
      color: var(--accent);
    }

    .title-group p {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .status-badge {
      font-size: 13px;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--panel-border);
      padding: 6px 16px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      background: #4caf50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .status-badge .dot.loading {
      background: #f5a623;
      box-shadow: 0 0 8px rgba(245, 166, 35, 0.4);
    }

    /* ==========================================================================
       REELS GRID SYSTEM
       ========================================================================== */
    .reels-container {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 20px;
      padding: 16px;
      border: 1px solid var(--panel-border);
      box-shadow: inset 0 4px 30px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .reel {
      background: radial-gradient(ellipse at 50% 20%, var(--tile-bg), var(--panel-bg));
      border-radius: 12px;
      padding: 14px 6px;
      text-align: center;
      border: 1px solid var(--panel-border);
      box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.6), 0 4px 12px rgba(0, 0, 0, 0.3);
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .reel.spinning {
      border-color: var(--accent);
      box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.6), 0 0 25px rgba(202, 138, 4, 0.15);
    }

    .reel.stopped {
      border-color: var(--panel-border);
    }

    .reel .category-label {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      background: rgba(0, 0, 0, 0.4);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--panel-border);
      width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reel .icon-wrap {
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 10px;
      margin: 2px auto 8px;
      border: 1px solid var(--panel-border);
      overflow: hidden;
      flex-shrink: 0;
    }

    .reel .icon-wrap img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.6));
    }

    .reel .icon-wrap .placeholder-icon {
      font-size: 28px;
      opacity: 0.3;
      color: var(--accent);
    }

    .reel .item-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--header-text);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 4px;
      margin-top: 2px;
      min-height: 16px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }

    .reel .item-short {
      font-size: 10px;
      color: var(--text-secondary);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-height: 14px;
    }

    .reel .spin-glow {
      position: absolute;
      inset: -1px;
      border-radius: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      background: radial-gradient(circle at 50% 50%, rgba(202, 138, 4, 0.08), transparent 70%);
    }

    .reel.spinning .spin-glow {
      opacity: 1;
      animation: glow-pulse 0.4s ease-in-out infinite alternate;
    }

    /* Generator Spin controls */
    .spin-area {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 12px 0;
      flex-shrink: 0;
    }

    .btn-spin {
      background: linear-gradient(180deg, var(--accent-hover) 0%, var(--accent) 100%);
      border: none;
      padding: 14px 54px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #000;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Orbitron', sans-serif;
    }

    .btn-spin:hover:not(:disabled) {
      transform: scale(1.03);
      filter: brightness(1.1);
    }

    .btn-spin:active:not(:disabled) {
      transform: scale(0.97);
    }

    .btn-spin:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-spin .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(0, 0, 0, 0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin-loader 0.8s linear infinite;
    }

    .btn-spin.loading .spinner { display: block; }
    .btn-spin.loading .btn-text { display: none; }
    .btn-spin.loading .icon { display: none; }

    /* ==========================================================================
       DETAIL PANEL & COST METRICS
       ========================================================================== */
    .loadout-details {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid var(--panel-border);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .loadout-details .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .loadout-details .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--panel-border), transparent);
    }

    /* Cost Summary Banner */
    .cost-summary-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .cost-card {
      flex: 1;
      min-width: 200px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--panel-border);
      border-radius: var(--card-radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cost-card.pvp-card {
      border-left: 3px solid var(--accent-pvp);
    }

    .cost-card.pve-card {
      border-left: 3px solid var(--accent-pve);
    }

    .cost-card-info .cost-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      font-weight: bold;
    }

    .cost-card-info .cost-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      margin-top: 2px;
    }

    .cost-card-icon {
      font-size: 20px;
      opacity: 0.5;
    }

    .cost-card.pvp-card .cost-card-icon { color: var(--accent-pvp); }
    .cost-card.pve-card .cost-card-icon { color: var(--accent-pve); }

    .loadout-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .loadout-item {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border: 1px solid var(--panel-border);
      transition: background 0.2s, border-color 0.2s;
    }

    .loadout-item:hover {
      background: var(--tile-hover);
      border-color: var(--accent);
    }

    .loadout-item .li-icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      border: 1px solid var(--panel-border);
      overflow: hidden;
      margin-top: 2px;
    }

    .loadout-item .li-icon img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
    }

    .loadout-item .li-icon .placeholder-icon {
      font-size: 22px;
      opacity: 0.3;
      color: var(--accent);
    }

    .loadout-item .li-info {
      min-width: 0;
      flex: 1;
    }

    .loadout-item .li-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      width: 100%;
    }

    .loadout-item .li-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--header-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .loadout-item .wiki-link {
      font-size: 9px;
      color: var(--accent);
      text-decoration: none;
      background: rgba(202, 138, 4, 0.08);
      border: 1px solid rgba(202, 138, 4, 0.2);
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      transition: all 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }

    .loadout-item .wiki-link:hover {
      background: rgba(202, 138, 4, 0.2);
      border-color: rgba(202, 138, 4, 0.4);
      transform: translateY(-1px);
    }

    .loadout-item .li-category {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 1px;
    }

    .loadout-item .li-stats {
      font-size: 10px;
      color: var(--text-primary);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      margin-top: 6px;
    }

    .loadout-item .li-stats span {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .loadout-item .li-stats .stat-label {
      color: var(--text-secondary);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .loadout-item .li-stats .stat-value {
      color: var(--text-primary);
      font-weight: 600;
    }

    .loadout-item .li-stats .stat-pvp-flea {
      background: rgba(74, 144, 226, 0.08);
      border: 1px solid rgba(74, 144, 226, 0.2);
      padding: 1px 5px;
      border-radius: 4px;
      color: #72a0e5;
    }

    .loadout-item .li-stats .stat-pve-flea {
      background: rgba(139, 195, 74, 0.08);
      border: 1px solid rgba(139, 195, 74, 0.2);
      padding: 1px 5px;
      border-radius: 4px;
      color: #a1d95d;
    }

    .loadout-item .li-stats .stat-inactive {
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid var(--panel-border) !important;
      color: var(--text-secondary) !important;
    }

    .loadout-item .li-stats .stat-inactive .stat-value {
      color: var(--text-secondary) !important;
      font-weight: 400;
    }

    .empty-state {
      color: var(--text-secondary);
      text-align: center;
      padding: 40px 10px;
      font-size: 14px;
      grid-column: 1 / -1;
    }

    .empty-state .big-icon {
      font-size: 44px;
      display: block;
      margin-bottom: 12px;
      opacity: 0.3;
      color: var(--accent);
    }

    .empty-state .sub {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 4px;
    }

    /* Staggered load items animation */
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin-loader {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    @keyframes glow-pulse {
      0% { opacity: 0.2; }
      100% { opacity: 0.8; }
    }

    /* ==========================================================================
       RESPONSIVE BREAKPOINTS
       ========================================================================== */
    @media (max-width: 1200px) {
      .reels-container {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 8px;
      }
      .reels-container {
        grid-template-columns: repeat(2, 1fr);
        padding: 10px;
      }
      .reel {
        min-height: 160px;
        padding: 10px 4px;
      }
    }

    @media (max-width: 480px) {
      .reels-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <header>
      <div class="logo-group">
        <i class="fas fa-crosshairs"></i>
        <div class="title-group">
          <h1>Tarkov <span>Generator</span></h1>
          <p>Tactical deployment loadout machine</p>
        </div>
      </div>
      <div class="status-badge">
        <span class="dot" id="slotStatusDot"></span>
        <span id="slotStatusText">Initializing scanner...</span>
      </div>
    </header>

    <!-- Slot Machine Reels Layout -->
    <div class="reels-container" id="slotReelsContainer"></div>

    <!-- Spin Controls -->
    <div class="spin-area">
      <button class="btn-spin" id="slotSpinBtn">
        <span class="icon">🎰</span>
        <span class="btn-text">RANDOMIZE</span>
        <span class="spinner" id="slotSpinner"></span>
      </button>
    </div>

    <!-- Full Loadout Grid Details -->
    <div class="loadout-details hidden" id="slotLoadoutDetails">
      <div class="section-title">📦 Selected Loadout Brief</div>
      
      <!-- Live PvP & PvE Total Cost Headers -->
      <div class="cost-summary-bar hidden" id="costSummaryBar">
        <div class="cost-card pvp-card">
          <div class="cost-card-info">
            <div class="cost-label">Total Loadout PvP Value</div>
            <div class="cost-value" id="pvpTotalValue">₽0</div>
          </div>
          <div class="cost-card-icon"><i class="fas fa-chart-line"></i></div>
        </div>
        <div class="cost-card pve-card">
          <div class="cost-card-info">
            <div class="cost-label">Total Loadout PvE Value</div>
            <div class="cost-value" id="pveTotalValue">₽0</div>
          </div>
          <div class="cost-card-icon"><i class="fas fa-robot"></i></div>
        </div>
      </div>

      <div id="slotLoadoutGrid" class="loadout-grid">
        <div class="empty-state">
          <span class="big-icon">🎯</span>
          Hit <strong>RANDOMIZE</strong> to compile a random deployment loadout
          <div class="sub">Includes live Flea Market rates & dynamic wiki references</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    //  STANDALONE LOADOUT GENERATOR ENGINE
    // ─────────────────────────────────────────────────────────────
    const SlotMachineApp = {
      API_URL: 'https://api.tarkov.dev/graphql',
      
      CATEGORY_MAP: {
        'PrimaryWeapon': 'Primary',
        'SecondaryWeapon': 'Secondary',
        'Pistol': 'Pistol',
        'Helmet': 'Helmet',
        'Armor': 'Body Armor',
        'Vest': 'Tactical Rig',
        'Backpack': 'Backpack',
        'Headphone': 'Headset',
        'Face Cover': 'Face Cover',
        'Eyewear': 'Eyewear',
        'Melee': 'Melee',
      },

      CATEGORY_EMOJIS: {
        'PrimaryWeapon': '⚔️',
        'SecondaryWeapon': '🔫',
        'Pistol': '🔫',
        'Helmet': '🪖',
        'Armor': '🛡️',
        'Vest': '🎽',
        'Backpack': '🎒',
        'Headphone': '🎧',
        'Face Cover': '😷',
        'Eyewear': '🕶️',
        'Melee': '🔪'
      },

      SLOT_CATEGORIES: ['PrimaryWeapon', 'SecondaryWeapon', 'Pistol', 'Helmet', 'Armor', 'Vest', 'Backpack'],
      EXTRA_CATEGORIES: ['Headphone', 'Face Cover', 'Eyewear', 'Melee'],
      
      allItems: [],
      itemsByCategory: {},
      currentLoadout: {},
      isSpinning: false,

      // Dual PvP & PvE Flea Pricing Fetch Routine
      fetchAllItems: async function() {
        const richQuery = `
          query {
            pvp: items(lang: en, gameMode: regular) {
              id
              name
              shortName
              wikiLink
              iconLink
              basePrice
              weight
              types
              avg24hPrice
              category {
                id
                name
              }
              properties {
                __typename
                ... on ItemPropertiesWeapon {
                  caliber
                  fireRate
                  ergonomics
                  recoilVertical
                }
                ... on ItemPropertiesArmor {
                  class
                  durability
                }
              }
            }
            pve: items(lang: en, gameMode: pve) {
              id
              avg24hPrice
            }
          }
        `;

        const safeQuery = `
          query {
            items(lang: en) {
              id
              name
              shortName
              wikiLink
              iconLink
              basePrice
              weight
              avg24hPrice
              types
              category {
                id
                name
              }
            }
          }
        `;

        try {
          const resp = await fetch(this.API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ query: richQuery }),
          });
          
          const json = await resp.json();
          if (json.errors) throw new Error(json.errors[0].message);
          
          const pvpItems = json.data.pvp || [];
          const pveItems = json.data.pve || [];
          
          const pvePriceMap = {};
          for (const item of pveItems) {
            pvePriceMap[item.id] = item.avg24hPrice;
          }
          
          for (const item of pvpItems) {
            item.pvePrice = pvePriceMap[item.id] || null;
          }
          
          return pvpItems;
        } catch (err) {
          console.warn('Dual PvP/PvE GraphQL query failed, trying safe fallback...', err);
          
          const resp = await fetch(this.API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ query: safeQuery }),
          });
          
          const json = await resp.json();
          if (json.errors) throw new Error(json.errors[0].message);
          
          const items = json.data.items || [];
          for (const item of items) {
            item.pvePrice = item.avg24hPrice;
          }
          return items;
        }
      },

      // Filter out mods, barrels, receivers and accessories
      isFunctionalWeapon: function(item) {
        const types = item.types || [];
        const name = (item.name || '').toLowerCase();
        const catName = (item.category?.name || '').toLowerCase();
        
        const isGun = types.includes('weapon') || types.includes('gun') || catName.includes('gun') || catName.includes('firearm');
        if (!isGun) return false;
        
        const blacklistedTypes = [
          'modification', 'mods', 'barrel', 'stock', 'pistolGrip', 
          'handguard', 'muzzle', 'sight', 'magazine', 'receiver', 
          'chargingHandle', 'mount', 'functionalMod'
        ];
        if (types.some(t => blacklistedTypes.includes(t))) return false;
        
        const blacklistedKeywords = [
          'receiver', 'charging handle', 'grip', 'stock', 'barrel', 'slide', 'magazine', 
          'mount', 'sight', 'scope', 'compensator', 'silencer', 'suppressor', 'thread', 
          'adapter', 'gas block', 'handguard', 'foregrip', 'chassis', 'buttpad', 
          'handle', 'buffer tube', 'muzzle brake'
        ];
        
        if (blacklistedKeywords.some(kw => name.includes(kw) || catName.includes(kw))) return false;
        
        return true;
      },

      categorizeItems: function(items) {
        const map = {
          'PrimaryWeapon': [],
          'SecondaryWeapon': [],
          'Pistol': [],
          'Helmet': [],
          'Armor': [],
          'Vest': [],
          'Backpack': [],
          'Headphone': [],
          'Face Cover': [],
          'Eyewear': [],
          'Melee': []
        };

        for (const item of items) {
          const types = item.types || [];
          const catName = (item.category?.name || '').toLowerCase();
          const itemName = (item.name || '').toLowerCase();

          if (types.includes('melee') || catName.includes('melee') || catName.includes('knife') || itemName.includes('sword') || itemName.includes('machete')) {
            if (!types.includes('modification')) {
              map['Melee'].push(item);
            }
          }
          // Strictly isolate pistols so they do not fall into primary/secondary weapons
          else if ((types.includes('pistol') || catName.includes('pistol') || catName.includes('handgun') || catName === 'handguns' || itemName.includes('pistol') || itemName.includes('revolver')) && this.isFunctionalWeapon(item)) {
            map['Pistol'].push(item);
          }
          else if (this.isFunctionalWeapon(item)) {
            map['PrimaryWeapon'].push(item);
            map['SecondaryWeapon'].push(item);
          }
          else if (types.includes('helmet') || catName.includes('helmet') || catName.includes('headwear') || catName === 'helmets') {
            if (!types.includes('modification') && !itemName.includes('visor') && !itemName.includes('shield') && !itemName.includes('cover') && !itemName.includes('plate') && !itemName.includes('strap')) {
              map['Helmet'].push(item);
            }
          }
          else if (types.includes('rig') || types.includes('chestRig') || catName.includes('rig') || catName.includes('vest') || catName.includes('tactical')) {
            if (!types.includes('modification')) {
              map['Vest'].push(item);
            }
          }
          else if ((types.includes('armor') || catName.includes('armor') || catName.includes('vest')) && !types.includes('helmet') && !types.includes('rig')) {
            if (!types.includes('modification')) {
              map['Armor'].push(item);
            }
          }
          else if (types.includes('backpack') || catName.includes('backpack')) {
            map['Backpack'].push(item);
          }
          else if (types.includes('headphones') || types.includes('headset') || catName.includes('headphone') || catName.includes('headset') || catName.includes('ear')) {
            map['Headphone'].push(item);
          }
          else if (types.includes('facecover') || catName.includes('facecover') || catName.includes('visor') || catName.includes('mask') || catName.includes('face cover')) {
            map['Face Cover'].push(item);
          }
          else if (types.includes('glasses') || catName.includes('glasses') || catName.includes('eyewear') || catName.includes('goggles')) {
            map['Eyewear'].push(item);
          }
        }

        for (const cat in map) {
          map[cat].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        }
        return map;
      },

      pickRandom: function(arr) {
        if (!arr || arr.length === 0) return null;
        return arr[Math.floor(Math.random() * arr.length)];
      },

      getDisplayName: function(item) {
        return item.shortName || item.name || 'Unknown';
      },

      getIconHtml: function(item, fallbackEmoji = '🎯') {
        if (item?.iconLink) {
          return `<img src="${item.iconLink}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling?.classList.remove('hidden')" />
             <span class="placeholder-icon hidden">${fallbackEmoji}</span>`;
        }
        return `<span class="placeholder-icon">${fallbackEmoji}</span>`;
      },

      getStatLines: function(item) {
        const lines = [];
        if (item.basePrice) lines.push({ label: 'Base Price', value: '₽' + item.basePrice.toLocaleString() });
        
        if (item.avg24hPrice) {
          lines.push({ label: 'PvP Flea', value: '₽' + item.avg24hPrice.toLocaleString(), isFlea: true, mode: 'pvp' });
        } else {
          lines.push({ label: 'PvP Flea', value: 'Banned', isFlea: true, mode: 'pvp', inactive: true });
        }

        if (item.pvePrice) {
          lines.push({ label: 'PvE Flea', value: '₽' + item.pvePrice.toLocaleString(), isFlea: true, mode: 'pve' });
        } else {
          lines.push({ label: 'PvE Flea', value: 'Banned', isFlea: true, mode: 'pve', inactive: true });
        }

        if (item.weight) lines.push({ label: 'Weight', value: item.weight + 'kg' });

        const p = item?.properties;
        if (p) {
          if (p.caliber) lines.push({ label: 'Caliber', value: p.caliber.replace('Caliber', '') });
          if (p.fireRate) lines.push({ label: 'RPM', value: p.fireRate });
          if (p.ergonomics) lines.push({ label: 'Ergo', value: p.ergonomics });
          if (p.recoilVertical) lines.push({ label: 'Recoil V', value: p.recoilVertical });
          if (p.class) lines.push({ label: 'Class', value: p.class });
          if (p.durability) lines.push({ label: 'Armor durability', value: p.durability });
        }

        return lines;
      },

      // Calculate the combined market costs (incorporating fallbacks for unbanned trader items)
      calculateTotalCosts: function(loadout) {
        let pvpTotal = 0;
        let pveTotal = 0;
        const allCategories = [...this.SLOT_CATEGORIES, ...this.EXTRA_CATEGORIES];

        for (const cat of allCategories) {
          const item = loadout[cat];
          if (!item) continue;

          // PvP Price Logic: avg24hPrice -> basePrice -> 0
          const pvpPrice = item.avg24hPrice || item.basePrice || 0;
          pvpTotal += pvpPrice;

          // PvE Price Logic: pvePrice -> basePrice -> 0
          const pvePrice = item.pvePrice || item.basePrice || 0;
          pveTotal += pvePrice;
        }

        return { pvp: pvpTotal, pve: pveTotal };
      },

      renderReels: function() {
        const reelsContainer = document.getElementById('slotReelsContainer');
        reelsContainer.innerHTML = '';
        for (const cat of this.SLOT_CATEGORIES) {
          const items = this.itemsByCategory[cat] || [];
          const reel = document.createElement('div');
          reel.className = 'reel stopped';
          reel.dataset.category = cat;

          const displayName = this.CATEGORY_MAP[cat] || cat;
          const emoji = this.CATEGORY_EMOJIS[cat] || '🎯';
          const initialItem = items.length > 0 ? this.pickRandom(items) : null;

          reel.innerHTML = `
            <div class="category-label">${displayName}</div>
            <div class="icon-wrap" id="slot-reel-icon-${cat}">
              ${initialItem ? this.getIconHtml(initialItem, emoji) : `<span class="placeholder-icon">${emoji}</span>`}
            </div>
            <div class="item-name" id="slot-reel-name-${cat}">${initialItem ? this.getDisplayName(initialItem) : '—'}</div>
            <div class="item-short" id="slot-reel-short-${cat}">${initialItem?.shortName ? initialItem.shortName : ''}</div>
            <div class="spin-glow"></div>
          `;
          reelsContainer.appendChild(reel);
        }
      },

      updateReel: function(category, item) {
        const iconWrap = document.getElementById(`slot-reel-icon-${category}`);
        const nameEl = document.getElementById(`slot-reel-name-${category}`);
        const shortEl = document.getElementById('slot-reel-short-' + category);
        const emoji = this.CATEGORY_EMOJIS[category] || '🎯';

        if (iconWrap) iconWrap.innerHTML = item ? this.getIconHtml(item, emoji) : `<span class="placeholder-icon">${emoji}</span>`;
        if (nameEl) nameEl.textContent = item ? this.getDisplayName(item) : '—';
        if (shortEl) shortEl.textContent = item?.shortName || '';
      },

      setReelSpinning: function(category, spinning) {
        const reelsContainer = document.getElementById('slotReelsContainer');
        const reels = reelsContainer.querySelectorAll('.reel');
        for (const reel of reels) {
          if (reel.dataset.category === category) {
            reel.classList.toggle('spinning', spinning);
            reel.classList.toggle('stopped', !spinning);
            break;
          }
        }
      },

      setAllReelsSpinning: function(spinning) {
        const reelsContainer = document.getElementById('slotReelsContainer');
        const reels = reelsContainer.querySelectorAll('.reel');
        for (const reel of reels) {
          reel.classList.toggle('spinning', spinning);
          reel.classList.toggle('stopped', !spinning);
        }
      },

      renderLoadout: function(loadout) {
        const loadoutDetails = document.getElementById('slotLoadoutDetails');
        const loadoutGrid = document.getElementById('slotLoadoutGrid');
        const costSummaryBar = document.getElementById('costSummaryBar');
        
        loadoutDetails.classList.remove('empty');

        const allCategories = [...this.SLOT_CATEGORIES, ...this.EXTRA_CATEGORIES];
        let html = '';
        let hasItems = false;

        for (const cat of allCategories) {
          const item = loadout[cat];
          if (!item) continue;
          hasItems = true;

          const displayName = this.CATEGORY_MAP[cat] || cat;
          const emoji = this.CATEGORY_EMOJIS[cat] || '🎯';
          const stats = this.getStatLines(item);
          const wikiUrl = item.wikiLink || `https://escapefromtarkov.fandom.com/wiki/Special:Search?search=${encodeURIComponent(item.name)}`;

          const statsHtml = stats.length > 0 ?
            stats.map(s => {
              let extraClass = '';
              if (s.isFlea) {
                extraClass = s.mode === 'pvp' ? ' stat-pvp-flea' : ' stat-pve-flea';
                if (s.inactive) extraClass += ' stat-inactive';
              }
              return `<span class="${extraClass}"><span class="stat-label">${s.label}</span> <span class="stat-value">${s.value}</span></span>`;
            }).join('') :
            '';

          html += `
            <div class="loadout-item fade-in">
              <div class="li-icon">
                ${item.iconLink ? `<img src="${item.iconLink}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling?.classList.remove('hidden')" />
                  <span class="placeholder-icon hidden">${emoji}</span>` : `<span class="placeholder-icon">${emoji}</span>`}
              </div>
              <div class="li-info">
                <div class="li-name-row">
                  <div class="li-name" title="${item.name}">${this.getDisplayName(item)}</div>
                  <a href="${wikiUrl}" target="_blank" class="wiki-link">📖 Wiki</a>
                </div>
                <div class="li-category">${displayName}</div>
                ${statsHtml ? `<div class="li-stats">${statsHtml}</div>` : ''}
              </div>
            </div>
          `;
        }

        if (hasItems) {
          // Render Live Total Cost Badges
          const totals = this.calculateTotalCosts(loadout);
          document.getElementById('pvpTotalValue').textContent = '₽' + totals.pvp.toLocaleString();
          document.getElementById('pveTotalValue').textContent = '₽' + totals.pve.toLocaleString();
          costSummaryBar.classList.remove('hidden');
        } else {
          html = `
            <div class="empty-state">
              <span class="big-icon">🎯</span>
              No items loaded yet — try spinning!
            </div>
          `;
          costSummaryBar.classList.add('hidden');
        }

        loadoutGrid.innerHTML = html;
        requestAnimationFrame(() => {
          const items = loadoutGrid.querySelectorAll('.fade-in');
          items.forEach((el, i) => {
            el.style.animationDelay = `${i * 40}ms`;
          });
        });
      },

      generateLoadout: function() {
        const loadout = {};
        const allCats = [...this.SLOT_CATEGORIES, ...this.EXTRA_CATEGORIES];
        for (const cat of allCats) {
          const pool = this.itemsByCategory[cat] || [];
          loadout[cat] = pool.length > 0 ? this.pickRandom(pool) : null;
        }
        return loadout;
      },

      performSpin: function() {
        if (this.isSpinning) return;
        if (Object.keys(this.itemsByCategory).length === 0) {
          this.setStatus('No data — loading...', 'loading');
          return;
        }

        this.isSpinning = true;
        const spinBtn = document.getElementById('slotSpinBtn');
        spinBtn.disabled = true;
        spinBtn.classList.add('loading');
        this.setStatus('Spinning...', 'loading');

        // Hide loadout details while actively rolling
        document.getElementById('slotLoadoutDetails').classList.add('hidden');

        const finalLoadout = this.generateLoadout();
        this.currentLoadout = finalLoadout;

        this.setAllReelsSpinning(true);

        const slotCats = this.SLOT_CATEGORIES;
        let finishedCount = 0;

        slotCats.forEach((cat, index) => {
          // CS Case-opening stagger offset
          const baseSpinDuration = 2000 + (index * 450); 
          const stopTime = Date.now() + baseSpinDuration;
          
          this.spinReel(cat, 40, stopTime, finalLoadout[cat], () => {
            finishedCount++;
            if (finishedCount === slotCats.length) {
              this.finishSpin(finalLoadout);
            }
          });
        });
      },

      // Smooth Case-opening slowdown animation curve
      spinReel: function(cat, currentDelay, stopTime, finalItem, onComplete) {
        const timeLeft = stopTime - Date.now();

        if (timeLeft <= 0) {
          this.updateReel(cat, finalItem);
          this.setReelSpinning(cat, false);
          onComplete();
          return;
        }

        const pool = this.itemsByCategory[cat] || [];
        if (pool.length > 0) {
          const randomItem = this.pickRandom(pool);
          this.updateReel(cat, randomItem);
        }

        // Staggered CS-style deceleration curve
        let nextDelay = currentDelay;
        if (timeLeft < 1600) {
          const progress = 1 - (timeLeft / 1600); // 0 at 1.6s remaining to 1 at stop
          // Dynamic exponential slowdown factor
          nextDelay = 40 + (Math.pow(progress, 3) * 450); 
        }

        setTimeout(() => {
          this.spinReel(cat, nextDelay, stopTime, finalItem, onComplete);
        }, nextDelay);
      },

      finishSpin: function(loadout) {
        this.isSpinning = false;
        const spinBtn = document.getElementById('slotSpinBtn');
        spinBtn.disabled = false;
        spinBtn.classList.remove('loading');
        this.setStatus('Ready', '');
        
        // Show detailed card structure now that all picks have completed
        document.getElementById('slotLoadoutDetails').classList.remove('hidden');
        
        this.renderLoadout(loadout);
      },

      setStatus: function(text, state = '') {
        const statusText = document.getElementById('slotStatusText');
        const statusDot = document.getElementById('slotStatusDot');
        if (statusText) statusText.textContent = text;
        if (statusDot) statusDot.className = 'dot' + (state === 'loading' ? ' loading' : '');
      },

      init: async function() {
        this.setStatus('Loading data...', 'loading');
        const spinBtn = document.getElementById('slotSpinBtn');
        spinBtn.disabled = true;

        try {
          const items = await this.fetchAllItems();
          this.allItems = items;
          this.itemsByCategory = this.categorizeItems(items);

          const hasPrimary = this.itemsByCategory['PrimaryWeapon'] && this.itemsByCategory['PrimaryWeapon'].length > 0;
          if (!hasPrimary) {
            console.warn('Primary weapon map empty, executing wide fallback check...');
            const wideWeapons = items.filter(item => {
              const t = item.types || [];
              return t.includes('gun') || t.includes('weapon') || (item.category?.name || '').toLowerCase().includes('weapon');
            });
            this.itemsByCategory['PrimaryWeapon'] = wideWeapons;
            this.itemsByCategory['SecondaryWeapon'] = wideWeapons;
          }

          if (Object.keys(this.itemsByCategory).length === 0 || this.itemsByCategory['PrimaryWeapon'].length === 0) {
            throw new Error('Could not sort operational firearms.');
          }

          this.renderReels();

          const initial = this.generateLoadout();
          this.currentLoadout = initial;
          for (const cat of this.SLOT_CATEGORIES) {
            if (initial[cat]) this.updateReel(cat, initial[cat]);
          }

          // Leave the loadout-details container hidden on initial load until the first run
          this.setStatus('Ready', '');
          spinBtn.disabled = false;

        } catch (err) {
          console.error('Generator load error:', err);
          this.setStatus('Error loading data', '');
          spinBtn.disabled = true;
          
          const loadoutDetails = document.getElementById('slotLoadoutDetails');
          loadoutDetails.classList.remove('hidden');
          const loadoutGrid = document.getElementById('slotLoadoutGrid');
          loadoutGrid.innerHTML = `
            <div class="empty-state">
              <span class="big-icon">⚠️</span>
              Failed to load from Tarkov.dev API
              <div class="sub">${err.message || 'Check console for details'}</div>
              <div class="sub" style="margin-top:12px;font-size:12px;">
                <button onclick="SlotMachineApp.init()" style="background:rgba(202,138,4,0.15);border:1px solid rgba(202,138,4,0.2);color:var(--accent);padding:8px 20px;border-radius:30px;cursor:pointer;font-weight:600;font-size:13px;">
                  🔄 Retry
                </button>
              </div>
            </div>
          `;
          document.getElementById('slotReelsContainer').innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:30px 10px;color:var(--text-secondary);">
              <span style="font-size:40px;display:block;margin-bottom:8px;">🔌</span>
              No data — please try reloading
            </div>
          `;
        }

        // Event Binding
        spinBtn.addEventListener('click', () => this.performSpin());

        // Global space bar spinning
        document.addEventListener('keydown', (e) => {
          if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            if (!spinBtn.disabled) this.performSpin();
          }
        });
      }
    };

    /* ==========================================================================
       BOOTSTRAP APP ON LOAD
       ========================================================================== */
    document.addEventListener('DOMContentLoaded', () => {
      SlotMachineApp.init();
    });
  </script>
</body>
