<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>General Resource Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@400;700&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ==========================================================================
       THEME & GLOBAL VARIABLES
       ========================================================================== */
    :root {
      --app-bg: #0a0a0a;
      --panel-bg: #111;
      --panel-border: #2a2a2a;
      --header-bg: #1a1a1a;
      --header-text: #f0f0f0;
      --accent: #ca8a04;
      --accent-hover: #e0a010;
      --text-primary: #d4d4d4;
      --text-secondary: #888;
      --tile-bg: #222;
      --tile-border: #333;
      --tile-hover: #2a2a2a;
      --border-radius: 12px;
      --tile-radius: 8px;
      --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--app-bg);
      color: var(--text-primary);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--panel-border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* ==========================================================================
       APP CONTAINER
       ========================================================================== */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ==========================================================================
       TOP ROW / HEADER
       ========================================================================== */
    .top-row {
      width: 100%;
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .back-btn-square {
      background: var(--header-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      width: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      flex-shrink: 0;
      text-decoration: none;
    }
    .back-btn-square:hover {
      background: var(--tile-hover);
      color: var(--accent);
      border-color: var(--accent);
    }

    .app-header-title {
      flex: 1;
      background: var(--header-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--border-radius);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }
    .app-header-title i {
      color: var(--accent);
      font-size: 28px;
    }
    .app-header-title h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 1.5px;
      color: var(--header-text);
      margin: 0;
    }
    .app-header-title h1 span {
      color: var(--accent);
    }
    .app-header-title .sub {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: 0.8px;
      margin-left: auto;
      font-family: 'Rajdhani', sans-serif;
      text-transform: uppercase;
      border-left: 2px solid var(--panel-border);
      padding-left: 16px;
    }

    /* ==========================================================================
       LINKS / RESOURCE HUB STYLES
       ========================================================================== */
    .links-wrapper {
      padding: 8px 16px 24px 16px;
      overflow-y: auto;
      flex: 1;
      display: block;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--border-radius);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      margin-top: 4px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0 8px 0;
      padding: 12px 18px;
      background: var(--header-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--tile-radius);
      cursor: pointer;
      transition: 0.15s;
      user-select: none;
    }
    .section-title:first-child {
      margin-top: 0;
    }
    .section-title:hover {
      border-color: var(--accent);
      background: var(--tile-hover);
    }
    .section-title h2 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--header-text);
      flex: 1;
    }
    .section-title .count {
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--tile-bg);
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid var(--panel-border);
      margin-right: 8px;
    }
    .section-title .chevron {
      color: var(--text-secondary);
      transition: transform 0.25s ease;
      font-size: 14px;
    }
    .section-title .chevron.collapsed {
      transform: rotate(-90deg);
    }

    .section-body {
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
      max-height: 4000px;
      opacity: 1;
    }
    .section-body.collapsed {
      max-height: 0;
      opacity: 0;
      margin: 0;
      padding: 0;
    }

    .dial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      padding-top: 6px;
      padding-bottom: 14px;
    }

    .dial-card {
      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      border-radius: var(--tile-radius);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      transition: 0.2s ease;
      text-decoration: none;
      color: var(--text-primary);
      position: relative;
      min-height: 140px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .dial-card:hover {
      border-color: var(--accent);
      background: var(--tile-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }
    .dial-card .icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      margin-bottom: 12px;
      color: var(--accent);
      transition: 0.15s;
    }
    .dial-card:hover .icon-wrap {
      background: var(--header-bg);
      border-color: var(--accent);
    }
    .dial-card .card-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
      color: var(--header-text);
    }
    .dial-card .card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
      flex: 1;
    }
    .dial-card .l-badge {
      margin-top: 10px;
      font-size: 9px;
      text-transform: uppercase;
      font-weight: 700;
      background: var(--panel-bg);
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
    }
    .l-badge.utility {
      color: #b39ddb;
      border-color: #7e57c2;
    }
    .l-badge.reference {
      color: #4fc3f7;
      border-color: #4fc3f7;
    }
    .dial-card .external-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.4;
      transition: 0.15s;
    }
    .dial-card:hover .external-icon {
      opacity: 0.8;
      color: var(--accent);
    }

    /* ==========================================================================
       RESPONSIVE
       ========================================================================== */
    @media (max-width: 700px) {
      .app-header-title .sub {
        display: none;
      }
      .app-header-title h1 {
        font-size: 16px;
      }
      .dial-grid {
        grid-template-columns: 1fr;
      }
      .top-row {
        flex-wrap: wrap;
      }
      .back-btn-square {
        width: 44px;
        font-size: 14px;
      }
      .app-header-title {
        padding: 10px 16px;
      }
      .app-header-title i {
        font-size: 20px;
      }
      .links-wrapper {
        padding: 8px 10px 16px 10px;
      }
      .section-title {
        padding: 10px 14px;
      }
      .section-title h2 {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">

    <div class="top-row">
      <a href="#" class="back-btn-square" onclick="window.history.back(); return false;" title="Go Back">
        <i class="fas fa-arrow-left"></i>
      </a>
      <div class="app-header-title">
        <i class="fas fa-satellite-dish"></i>
        <h1>Resource <span>Hub</span></h1>
        <span class="sub">General Intelligence</span>
      </div>
    </div>

    <div class="links-wrapper">

      <!-- TOOLS & UTILITIES -->
      <div class="section-title" onclick="toggleSection('toolsBody', this)">
        <i class="fas fa-tools"></i>
        <h2>Tools &amp; Utilities</h2>
        <span class="count" id="toolsCount">0</span>
        <i class="fas fa-chevron-down chevron"></i>
      </div>
      <div class="section-body" id="toolsBody">
        <div class="dial-grid" id="toolsGrid"></div>
      </div>

      <!-- IMPORTANT WEBSITES (replaces Content Creators) -->
      <div class="section-title" onclick="toggleSection('websitesBody', this)">
        <i class="fas fa-globe"></i>
        <h2>Important Websites</h2>
        <span class="count" id="websitesCount">0</span>
        <i class="fas fa-chevron-down chevron"></i>
      </div>
      <div class="section-body" id="websitesBody">
        <div class="dial-grid" id="websitesGrid"></div>
      </div>

    </div>
  </div>

  <script>
    /* ==========================================================================
       TOGGLE SECTION (Collapse / Expand)
       ========================================================================== */
    function toggleSection(id, element) {
      const body = document.getElementById(id);
      const chevron = element.querySelector('.chevron');
      body.classList.toggle('collapsed');
      chevron.classList.toggle('collapsed');
    }

    /* ==========================================================================
       DATA & RENDER LOGIC
       ========================================================================== */

    // ---- TOOLS & UTILITIES ----
    const tools = [
      { name: 'AutoHotkey', desc: 'Macro execution & system automation script compiler', icon: 'fas fa-keyboard', url: 'https://www.autohotkey.com/', badge: 'utility' },
      { name: 'FPS Monitor', desc: 'Diagnostic hardware resource overlay displays', icon: 'fas fa-desktop', url: 'https://fpsmonitor.com/', badge: 'utility' },
      { name: 'Lossless Scaling', desc: 'Slick temporal upscaling & customizable frame generation', icon: 'fas fa-expand', url: 'https://losslessscaling.com/', badge: 'utility' },
      { name: 'MSI Afterburner', desc: 'Optimize core clocks, voltages, & GPU metrics safely', icon: 'fas fa-microchip', url: 'https://www.msi.com/Landing/afterburner/graphics-cards', badge: 'utility' },
      { name: 'OBS Studio', desc: 'Robust screen recording, game capturing, & broadcasts', icon: 'fas fa-video', url: 'https://obsproject.com/', badge: 'utility' },
      { name: 'reWASD', desc: 'Remap hardware outputs & game controllers directly', icon: 'fas fa-gamepad', url: 'https://www.rewasd.com/', badge: 'utility' },
      { name: 'ShareX Capture', desc: 'Open-source screen clipping & video capture suite', icon: 'fas fa-camera', url: 'https://getsharex.com/', badge: 'utility' },
      { name: 'Soundpad', desc: 'Broadcast audio segments directly through communication setups', icon: 'fas fa-music', url: 'https://leppsoft.com/soundpad/', badge: 'utility' },
      { name: 'VoiceAttack', desc: 'Control keyboard parameters using customized voice briefs', icon: 'fas fa-microphone', url: 'https://voiceattack.com/', badge: 'utility' }
    ];

    // ---- IMPORTANT WEBSITES (new) ----
    const websites = [
      { name: 'Wikipedia', desc: 'Free online encyclopedia covering almost every topic.', icon: 'fab fa-wikipedia-w', url: 'https://www.wikipedia.org/', badge: 'reference' },
      { name: 'dict.leo', desc: 'German-English dictionary and translation tool.', icon: 'fas fa-language', url: 'https://www.leo.org/', badge: 'reference' },
      { name: 'Google Translate', desc: 'Instant translation service for over 100 languages.', icon: 'fas fa-language', url: 'https://translate.google.com/', badge: 'reference' },
      { name: 'Stack Overflow', desc: 'Community Q&A platform for programmers.', icon: 'fab fa-stack-overflow', url: 'https://stackoverflow.com/', badge: 'reference' },
      { name: 'GitHub', desc: 'Version control hosting and collaborative development platform.', icon: 'fab fa-github', url: 'https://github.com/', badge: 'reference' },
      { name: 'Wolfram Alpha', desc: 'Computational knowledge engine for facts and data.', icon: 'fas fa-calculator', url: 'https://www.wolframalpha.com/', badge: 'reference' },
      { name: 'Reddit', desc: 'Front page of the internet with forums on every topic.', icon: 'fab fa-reddit', url: 'https://www.reddit.com/', badge: 'reference' },
      { name: 'Internet Archive', desc: 'Digital library of free books, movies, and web pages.', icon: 'fas fa-archive', url: 'https://archive.org/', badge: 'reference' }
    ];

    // ---- RENDER HELPER ----
    function renderCards(data, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = data.map(item => `
        <a href="${item.url}" target="_blank" class="dial-card">
          <span class="external-icon"><i class="fas fa-up-right-from-square"></i></span>
          <div class="icon-wrap"><i class="${item.icon}"></i></div>
          <div class="card-title">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
          <span class="l-badge ${item.badge}">${item.badge}</span>
        </a>
      `).join('');
    }

    // ---- INIT ----
    function init() {
      // Render Tools
      renderCards(tools, 'toolsGrid');
      document.getElementById('toolsCount').textContent = tools.length;

      // Render Websites
      renderCards(websites, 'websitesGrid');
      document.getElementById('websitesCount').textContent = websites.length;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
