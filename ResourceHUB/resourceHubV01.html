<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>General Resource Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ==========================================================================
       THEME & GLOBAL VARIABLES (Matching index.html)
       ========================================================================== */
    :root {
      --bg-color: #030303;
      --surface-color: rgba(18, 18, 18, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.2);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --tile-bg: rgba(18, 18, 18, 0.4);
      --tile-border: rgba(255, 255, 255, 0.08);
      --tile-hover: rgba(255, 255, 255, 0.03);
      --border-radius: 16px;
      --tile-radius: 12px;
      --transition-curve: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 50% 120%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* ==========================================================================
       APP CONTAINER
       ========================================================================== */
    .app-container {
      max-width: 1000px;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: fadeIn 0.8s var(--transition-curve);
    }

    /* ==========================================================================
       TOP ROW / GLASSMOPHIC HEADER
       ========================================================================== */
    .top-row {
      width: 100%;
      display: flex;
      gap: 16px;
      align-items: center;
      background: var(--surface-color);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 16px 24px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .back-btn-square {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.3s var(--transition-curve);
      cursor: pointer;
      text-decoration: none;
    }

    .back-btn-square:hover {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
      transform: scale(1.05);
    }

    .app-header-title {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }

    .app-header-title i {
      color: var(--text-primary);
      font-size: 24px;
    }

    .app-header-title h1 {
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0;
    }

    .app-header-title h1 span {
      color: var(--text-secondary);
      font-weight: 300;
    }

    .app-header-title .sub {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-left: 1px solid var(--border-color);
      padding-left: 16px;
      margin-left: auto;
    }

    /* ==========================================================================
       LINKS WRAPPER & SECTIONS
       ========================================================================== */
    .links-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: var(--surface-color);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--tile-radius);
      cursor: pointer;
      transition: all 0.4s var(--transition-curve);
      user-select: none;
    }

    .section-title:hover {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.02);
    }

    .section-title i:first-child {
      font-size: 18px;
      color: var(--text-secondary);
    }

    .section-title h2 {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-primary);
      flex: 1;
    }

    .section-title .count {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 10px;
      border-radius: 9999px;
      border: 1px solid var(--border-color);
      margin-right: 8px;
    }

    .section-title .chevron {
      color: var(--text-secondary);
      transition: transform 0.4s var(--transition-curve);
      font-size: 12px;
    }

    .section-title .chevron.collapsed {
      transform: rotate(-90deg);
    }

    .section-body {
      overflow: hidden;
      transition: max-height 0.5s var(--transition-curve), opacity 0.4s ease;
      max-height: 2000px;
      opacity: 1;
    }

    .section-body.collapsed {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* ==========================================================================
       MODERN DIAL CARDS (Spotlight Hover)
       ========================================================================== */
    .dial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding-top: 10px;
      padding-bottom: 20px;
    }

    .dial-card {
      position: relative;
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      height: 190px;
      justify-content: space-between;
      transition: all 0.4s var(--transition-curve);
      text-decoration: none;
      color: var(--text-primary);
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      border-radius: var(--tile-radius);
    }

    /* Dynamic mouse spotlight hover asset */
    .dial-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(800px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(255,255,255,0.04), transparent 40%);
      z-index: 1;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .dial-card:hover::before {
      opacity: 1;
    }

    .dial-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-hover);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .dial-card .icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      transition: all 0.4s var(--transition-curve);
      z-index: 2;
    }

    .dial-card:hover .icon-wrap {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
      transform: scale(1.05);
    }

    .dial-card .card-info-box {
      z-index: 2;
      width: 100%;
    }

    .dial-card .card-title {
      font-weight: 500;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      color: #ffffff;
    }

    .dial-card .card-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
      font-weight: 300;
    }

    .dial-card .badge-and-arrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      z-index: 2;
    }

    .dial-card .l-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.08em;
      background: rgba(255, 255, 255, 0.03);
      padding: 4px 12px;
      border-radius: 9999px;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    .l-badge.utility {
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .l-badge.reference {
      color: var(--text-secondary);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .dial-card .external-icon {
      font-size: 11px;
      color: var(--text-secondary);
      transition: all 0.4s var(--transition-curve);
    }

    .dial-card:hover .external-icon {
      color: #ffffff;
      transform: translate(2px, -2px);
    }

    /* ==========================================================================
       ANIMATIONS
       ========================================================================== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ==========================================================================
       RESPONSIVE DESIGN
       ========================================================================== */
    @media (max-width: 700px) {
      body {
        padding: 16px;
      }
      .app-header-title .sub {
        display: none;
      }
      .app-header-title h1 {
        font-size: 1.1rem;
      }
      .dial-grid {
        grid-template-columns: 1fr;
      }
      .top-row {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">

    <!-- Premium Header -->
    <div class="top-row">
      <a href="#" class="back-btn-square" onclick="window.history.back(); return false;" title="Go Back">
        <i class="fas fa-arrow-left"></i>
      </a>
      <div class="app-header-title">
        <i class="fas fa-satellite-dish"></i>
        <h1>Resource <span>Hub</span></h1>
        <span class="sub">General Intelligence</span>
      </div>
    </div>

    <!-- Collapsible Sections -->
    <div class="links-wrapper">

      <!-- TOOLS & UTILITIES -->
      <div class="section-title" onclick="toggleSection('toolsBody', this)">
        <i class="fas fa-tools"></i>
        <h2>Tools &amp; Utilities</h2>
        <span class="count" id="toolsCount">0</span>
        <i class="fas fa-chevron-down chevron"></i>
      </div>
      <div class="section-body" id="toolsBody">
        <div class="dial-grid" id="toolsGrid"></div>
      </div>

      <!-- IMPORTANT WEBSITES -->
      <div class="section-title" onclick="toggleSection('websitesBody', this)">
        <i class="fas fa-globe"></i>
        <h2>Important Websites</h2>
        <span class="count" id="websitesCount">0</span>
        <i class="fas fa-chevron-down chevron"></i>
      </div>
      <div class="section-body" id="websitesBody">
        <div class="dial-grid" id="websitesGrid"></div>
      </div>

    </div>
  </div>

  <script>
    /* ==========================================================================
       TOGGLE SECTION (Collapse / Expand)
       ========================================================================== */
    function toggleSection(id, element) {
      const body = document.getElementById(id);
      const chevron = element.querySelector('.chevron');
      body.classList.toggle('collapsed');
      chevron.classList.toggle('collapsed');
    }

    /* ==========================================================================
       DATA SETS
       ========================================================================== */
    const tools = [
      { name: 'AutoHotkey', desc: 'Macro execution & system automation script compiler', icon: 'fas fa-keyboard', url: 'https://www.autohotkey.com/', badge: 'utility' },
      { name: 'FPS Monitor', desc: 'Diagnostic hardware resource overlay displays', icon: 'fas fa-desktop', url: 'https://fpsmonitor.com/', badge: 'utility' },
      { name: 'Lossless Scaling', desc: 'Slick temporal upscaling & customizable frame generation', icon: 'fas fa-expand', url: 'https://losslessscaling.com/', badge: 'utility' },
      { name: 'MSI Afterburner', desc: 'Optimize core clocks, voltages, & GPU metrics safely', icon: 'fas fa-microchip', url: 'https://www.msi.com/Landing/afterburner/graphics-cards', badge: 'utility' },
      { name: 'OBS Studio', desc: 'Robust screen recording, game capturing, & broadcasts', icon: 'fas fa-video', url: 'https://obsproject.com/', badge: 'utility' },
      { name: 'reWASD', desc: 'Remap hardware outputs & game controllers directly', icon: 'fas fa-gamepad', url: 'https://www.rewasd.com/', badge: 'utility' },
      { name: 'ShareX Capture', desc: 'Open-source screen clipping & video capture suite', icon: 'fas fa-camera', url: 'https://getsharex.com/', badge: 'utility' },
      { name: 'Soundpad', desc: 'Broadcast audio segments directly through communication setups', icon: 'fas fa-music', url: 'https://leppsoft.com/soundpad/', badge: 'utility' },
      { name: 'VoiceAttack', desc: 'Control keyboard parameters using customized voice briefs', icon: 'fas fa-microphone', url: 'https://voiceattack.com/', badge: 'utility' }
    ];

    const websites = [
      { name: 'Wikipedia', desc: 'Free online encyclopedia covering almost every topic.', icon: 'fab fa-wikipedia-w', url: 'https://www.wikipedia.org/', badge: 'reference' },
      { name: 'dict.leo', desc: 'German-English dictionary and translation tool.', icon: 'fas fa-language', url: 'https://www.leo.org/', badge: 'reference' },
      { name: 'Google Translate', desc: 'Instant translation service for over 100 languages.', icon: 'fas fa-language', url: 'https://translate.google.com/', badge: 'reference' },
      { name: 'Stack Overflow', desc: 'Community Q&A platform for programmers.', icon: 'fab fa-stack-overflow', url: 'https://stackoverflow.com/', badge: 'reference' },
      { name: 'GitHub', desc: 'Version control hosting and collaborative development platform.', icon: 'fab fa-github', url: 'https://github.com/', badge: 'reference' },
      { name: 'Wolfram Alpha', desc: 'Computational knowledge engine for facts and data.', icon: 'fas fa-calculator', url: 'https://www.wolframalpha.com/', badge: 'reference' },
      { name: 'Reddit', desc: 'Front page of the internet with forums on every topic.', icon: 'fab fa-reddit', url: 'https://www.reddit.com/', badge: 'reference' },
      { name: 'Internet Archive', desc: 'Digital library of free books, movies, and web pages.', icon: 'fas fa-archive', url: 'https://archive.org/', badge: 'reference' }
    ];

    /* ==========================================================================
       RENDER & INTERACTIVE SPOTLIGHT LOGIC
       ========================================================================== */
    function renderCards(data, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = data.map(item => `
        <a href="${item.url}" target="_blank" class="dial-card">
          <div class="icon-wrap"><i class="${item.icon}"></i></div>
          <div class="card-info-box">
            <div class="card-title">${item.name}</div>
            <div class="card-desc">${item.desc}</div>
          </div>
          <div class="badge-and-arrow">
            <span class="l-badge ${item.badge}">${item.badge}</span>
            <span class="external-icon"><i class="fas fa-arrow-trend-up"></i></span>
          </div>
        </a>
      `).join('');
    }

    // Attach dynamic spotlight listeners to cards
    function initSpotlightEffect() {
      const cards = document.querySelectorAll('.dial-card');
      cards.forEach(card => {
        card.addEventListener('mousemove', e => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          card.style.setProperty('--mouse-x', `${x}px`);
          card.style.setProperty('--mouse-y', `${y}px`);
        });
      });
    }

    /* ==========================================================================
       INITIALIZATION
       ========================================================================== */
    function init() {
      // Render Tools
      renderCards(tools, 'toolsGrid');
      document.getElementById('toolsCount').textContent = tools.length;

      // Render Websites
      renderCards(websites, 'websitesGrid');
      document.getElementById('websitesCount').textContent = websites.length;

      // Start spotlight interactive listener
      initSpotlightEffect();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
