<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarkov Toolkit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #2a2a2a;
            --border-light: #3a3a3a;
            --text: #e8e8e8;
            --text-dim: #777777;
            --text-muted: #444444;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --mono: Consolas, "Courier New", monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .app {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .header {
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 18px 22px;
            text-align: center;
        }

        .header-title {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
        }
        .header-title span {
            font-weight: 300;
            color: var(--text-dim);
        }
        .header-sub {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            margin-top: 4px;
            font-family: var(--mono);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 560px) {
            .tool-grid {
                grid-template-columns: 1fr;
            }
        }

        .tool-card {
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 40px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition: border-color 0.2s, background 0.2s;
            text-decoration: none;
            color: inherit;
            min-height: 220px;
            justify-content: center;
        }
        .tool-card:hover {
            border-color: var(--border-light);
            background: #111;
        }

        .tool-card .icon {
            font-size: 56px;
            line-height: 1;
        }
        .tool-card h2 {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .tool-card p {
            font-family: var(--font);
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.5;
            max-width: 260px;
        }
        .tool-card .arrow {
            color: var(--text-dim);
            font-size: 18px;
            font-family: var(--mono);
            margin-top: 4px;
            transition: color 0.2s;
        }
        .tool-card:hover .arrow {
            color: #fff;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--mono);
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
    </style>
</head>
<body>

    <div class="app">

        <header class="header">
            <div class="header-title">TARKOV <span>TOOLKIT</span></div>
            <div class="header-sub">select a category</div>
        </header>

        <!-- Two main buttons -->
        <div class="tool-grid">

            <!-- Button 1: Escape from Tarkov -->
            <a href="/EscapeFromTarkov/eftIndex.html" class="tool-card">
                <div class="icon">🎯</div>
                <h2>ESCAPE FROM TARKOV</h2>
                <p>Loadout generator, trivia, official channels, community tools &amp; databases.</p>
                <div class="arrow">⏎</div>
            </a>

            <!-- Button 2: Tools & Accessibility -->
            <a href="/ResourceHUB/resourceHubV01.html" class="tool-card">
                <div class="icon">🛠️</div>
                <h2>TOOLS &amp; ACCESSIBILITY</h2>
                <p>Performance utilities, screen capture, macros, creator hubs &amp; general resources.</p>
                <div class="arrow">⏎</div>
            </a>

        </div>

        <div class="footer-note">
            launch a tool to proceed
        </div>

    </div>

</body>
</html>
