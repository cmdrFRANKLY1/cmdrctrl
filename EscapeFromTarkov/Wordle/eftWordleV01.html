<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarkov Wordle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ==========================================================================
           THEME & GLOBAL VARIABLES (Matching parent index aesthetics)
           ========================================================================== */
        :root {
            --bg-color: #030303;
            --surface-color: rgba(18, 18, 18, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            
            --correct: #10b981;    /* Sleek Emerald Green */
            --present: #f59e0b;    /* Sleek Amber Gold */
            --wrong: #ef4444;      /* Sleek Red */
            --absent: #27272a;     /* Deep Zinc gray */
            
            --border-radius: 16px;
            --tile-radius: 8px;
            --transition-curve: cubic-bezier(0.16, 1, 0.3, 1);
            
            --tile-size: 52px;
            --tile-gap: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 120%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Scrollbar aesthetics */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .app {
            max-width: 580px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.8s var(--transition-curve);
        }

        /* ==========================================================================
           TOP NAVIGATION ROW & GLASSMOPRHIC HEADER
           ========================================================================== */
        .top-row {
            display: flex;
            gap: 12px;
            width: 100%;
            align-items: stretch;
        }

        .back-btn-square {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            width: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s var(--transition-curve);
            cursor: pointer;
            text-decoration: none;
            flex-shrink: 0;
        }

        .back-btn-square:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: scale(1.05);
        }

        .header {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            flex: 1;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .header-title {
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #ffffff;
        }
        .header-title span {
            font-weight: 300;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Sleek Status / Badges */
        .header-score {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-score .score-value {
            font-weight: 700;
            color: #ffffff;
        }

        .header-status {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.01);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-status .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            transition: background 0.3s;
        }
        .header-status .dot.loading {
            background: #ffffff;
            box-shadow: 0 0 8px #ffffff;
            animation: blink 0.9s step-end infinite;
        }
        .header-status .dot.ready {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* Modernized Custom Toggles */
        .debug-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            user-select: none;
        }
        .debug-toggle input[type="checkbox"] {
            appearance: none;
            width: 24px;
            height: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s var(--transition-curve);
        }
        .debug-toggle input[type="checkbox"]::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            transition: all 0.3s var(--transition-curve);
        }
        .debug-toggle input[type="checkbox"]:checked {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        .debug-toggle input[type="checkbox"]:checked::after {
            left: 12px;
            background: #ffffff;
        }

        /* ==========================================================================
           GAME BOX CONTAINER
           ========================================================================== */
        .game-area {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            min-height: 480px;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        /* ===== START INTERFACE ===== */
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 40px 16px;
            width: 100%;
            min-height: 360px;
            text-align: center;
        }
        .start-screen .start-icon {
            font-size: 54px;
            line-height: 1;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
            animation: bounce-slow 4s ease-in-out infinite;
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .start-screen .start-title {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #ffffff;
        }
        .start-screen .start-sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 340px;
            font-weight: 300;
        }
        .start-screen .btn-start {
            background: transparent;
            border: 1px solid var(--border-color);
            color: #ffffff;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 14px 44px;
            cursor: pointer;
            transition: all 0.3s var(--transition-curve);
            margin-top: 10px;
        }
        .start-screen .btn-start:hover:not(:disabled) {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: scale(1.02);
        }
        .start-screen .btn-start:active:not(:disabled) {
            transform: scale(0.98);
        }
        .start-screen .btn-start:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .start-screen .word-count {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* ===== LETTER GRID ===== */
        .wordle-grid {
            display: none;
            flex-direction: column;
            gap: var(--tile-gap);
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }
        .wordle-grid.active {
            display: flex;
        }

        .grid-row {
            display: flex;
            gap: var(--tile-gap);
            justify-content: center;
        }

        .tile {
            width: var(--tile-size);
            height: var(--tile-size);
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--tile-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 500;
            text-transform: uppercase;
            color: var(--text-primary);
            transition: border-color 0.2s, background 0.4s var(--transition-curve), transform 0.2s;
            user-select: none;
        }
        .tile.filled {
            border-color: rgba(255, 255, 255, 0.25);
        }
        .tile.active {
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
        }

        /* State colors matching glass design */
        .tile.correct {
            background: var(--correct) !important;
            border-color: var(--correct) !important;
            color: #000000 !important;
            font-weight: 600;
            animation: tile-pop 0.35s var(--transition-curve);
        }
        .tile.present {
            background: var(--present) !important;
            border-color: var(--present) !important;
            color: #000000 !important;
            font-weight: 600;
            animation: tile-pop 0.35s var(--transition-curve);
        }
        .tile.absent {
            background: var(--absent) !important;
            border-color: var(--absent) !important;
            color: var(--text-secondary) !important;
            opacity: 0.6;
            animation: tile-pop 0.35s var(--transition-curve);
        }

        @keyframes tile-pop {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .tile.shake {
            animation: tile-shake 0.4s ease;
        }
        @keyframes tile-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* ===== ON-SCREEN KEYBOARD ===== */
        .keyboard {
            display: none;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }
        .keyboard.active {
            display: flex;
        }

        .kb-row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .kb-key {
            min-width: 32px;
            height: 44px;
            padding: 0 4px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s var(--transition-curve);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            flex: 1;
            max-width: 44px;
        }
        .kb-key.wide {
            flex: 1.6;
            max-width: 68px;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        .kb-key:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .kb-key:active:not(:disabled) {
            transform: scale(0.95);
        }
        .kb-key:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .kb-key.correct {
            background: var(--correct) !important;
            border-color: var(--correct) !important;
            color: #000000 !important;
            font-weight: 600;
        }
        .kb-key.present {
            background: var(--present) !important;
            border-color: var(--present) !important;
            color: #000000 !important;
            font-weight: 600;
        }
        .kb-key.absent {
            background: var(--absent) !important;
            border-color: var(--absent) !important;
            color: var(--text-secondary) !important;
            opacity: 0.4;
        }

        /* ===== FEEDBACK & ALERTS ===== */
        .feedback-area {
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 500;
            gap: 12px;
            text-align: center;
            flex-wrap: wrap;
            padding: 0 6px;
        }
        .feedback-area .correct-text {
            color: var(--correct);
            font-weight: 600;
        }
        .feedback-area .wrong-text {
            color: var(--wrong);
            font-weight: 600;
        }
        .feedback-area .sub-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .feedback-area .hint-text {
            color: var(--present);
            font-weight: 400;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        /* ===== ANSWER SHOWCASE ===== */
        .answer-reveal {
            display: none;
            align-items: center;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--text-primary);
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--tile-radius);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .answer-reveal.visible {
            display: flex;
        }
        .answer-reveal .answer-word {
            font-weight: 600;
            color: var(--present);
            font-size: 1.1rem;
            letter-spacing: 0.08em;
        }
        .answer-reveal .answer-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 4px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
        }

        /* ==========================================================================
           RESPONSIVE INTERFACES
           ========================================================================== */
        @media (max-width: 600px) {
            :root {
                --tile-size: 44px;
                --tile-gap: 6px;
            }
            .header-title {
                font-size: 0.95rem;
            }
            .header-score {
                font-size: 0.7rem;
                padding: 3px 10px;
            }
            .game-area {
                padding: 24px 16px 16px;
                min-height: 420px;
            }
            .tile {
                font-size: 1.2rem;
            }
            .kb-key {
                height: 38px;
                font-size: 0.75rem;
                min-width: 26px;
                max-width: 36px;
            }
            .kb-key.wide {
                max-width: 54px;
                font-size: 0.7rem;
            }
            .start-screen .start-icon {
                font-size: 44px;
            }
            .start-screen .start-title {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 400px) {
            :root {
                --tile-size: 38px;
                --tile-gap: 5px;
            }
            .tile {
                font-size: 1.1rem;
            }
            .kb-key {
                height: 34px;
                font-size: 0.7rem;
                min-width: 22px;
                max-width: 30px;
            }
            .kb-key.wide {
                max-width: 44px;
            }
            .game-area {
                padding: 16px 12px;
                min-height: 380px;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- TOP NAVIGATION ROW -->
        <div class="top-row">
            <!-- Back Button with premium square layout -->
            <a href="/EscapeFromTarkov/eftIndex.html" class="back-btn-square" title="Back to Index">
                <i class="fas fa-arrow-left"></i>
            </a>
            
            <!-- Header Frame -->
            <header class="header">
                <div>
                    <div class="header-title">Tarkov <span>Wordle</span></div>
                    <div style="font-size: 9px; color: var(--text-secondary); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 2px;">
                        Guess the 5‑letter intel word
                    </div>
                </div>
                <div class="header-right">
                    <div class="header-score">
                        🏆 <span class="score-value" id="scoreDisplay">0</span>
                    </div>
                    <label class="debug-toggle">
                        <input type="checkbox" id="strictToggle" />
                        strict
                    </label>
                    <label class="debug-toggle">
                        <input type="checkbox" id="debugToggle" />
                        debug
                    </label>
                    <div class="header-status">
                        <span class="dot" id="statusDot"></span>
                        <span id="statusText">Initializing...</span>
                    </div>
                </div>
            </header>
        </div>

        <!-- MAIN GAME BOX -->
        <div class="game-area" id="gameArea">
            <!-- START INTERFACE -->
            <div class="start-screen" id="startScreen">
                <div class="start-icon" id="startIcon">🎯</div>
                <div class="start-title" id="startTitle">Tarkov Wordle</div>
                <div class="start-sub" id="startSub">
                    Guess the 5‑letter Tarkov operational word in 6 tries.<br />
                    Parameters are sourced from active items, traders &amp; theater maps.
                </div>
                <button class="btn-start" id="startBtn">[ play ]</button>
                <div class="word-count" id="wordCount">Loading Database...</div>
            </div>

            <!-- GRID BOARD -->
            <div class="wordle-grid" id="wordleGrid"></div>

            <!-- KEYBOARD CONTAINER -->
            <div class="keyboard" id="keyboard"></div>

            <!-- ALERTS & MESSAGES -->
            <div class="feedback-area" id="feedbackArea"></div>

            <!-- INTEL SUMMARY -->
            <div class="answer-reveal" id="answerReveal">
                <span>Decrypted Intel:</span>
                <span class="answer-word" id="answerWord">—</span>
                <img class="answer-icon" id="answerIcon" src="" alt="" style="display:none;" />
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  TARKOV WORDLE · 5‑letter words from tarkov.dev
        // ================================================================

        const WordleApp = {
            // Local Vercel proxy route
            PROXY_URL: '/api/tarkov-data',
            // Fallback direct URL if the serverless routing is unavailable
            FALLBACK_API_URL: 'https://api.tarkov.dev/graphql',

            allItems: [],
            allTraders: [],
            wordPool: [],
            answerWord: null,
            answerItem: null,

            currentRow: 0,
            currentCol: 0,
            guesses: [],
            gameOver: false,
            win: false,
            score: 0,
            debugMode: false,
            strictMode: false,
            isLoading: false,
            isPlaying: false,

            FALLBACK_WORDS: [
                'killa', 'tagil', 'skier', 'fence', 'jaeger', 'woods',
                'shore', 'labs', 'inter', 'reser', 'custom', 'facto',
                'p226', 'm4a1', 'ak74', 'mp5', 'g18c', 'vepr', 'sks',
                'svd', 'sv98', 'mosin', 'vss', 'val', 'asval',
                'p90', 'mp7', 'mpx', 'vector', 'scav', 'pmc',
                'slick', 'hex', 'kiver', 'ulach', 'altyn', 'fast',
                'spawn', 'extr', 'dorms', 'loot', 'battl', 'tark',
                'bt', 'bs', 'm995', 'm855', 'm80', 'm61',
                'lps', '7n1', '7n3', '7n6', '7n9', '5h'
            ],

            el: {
                startScreen: document.getElementById('startScreen'),
                startIcon: document.getElementById('startIcon'),
                startTitle: document.getElementById('startTitle'),
                startSub: document.getElementById('startSub'),
                startBtn: document.getElementById('startBtn'),
                wordCount: document.getElementById('wordCount'),
                wordleGrid: document.getElementById('wordleGrid'),
                keyboard: document.getElementById('keyboard'),
                feedbackArea: document.getElementById('feedbackArea'),
                answerReveal: document.getElementById('answerReveal'),
                answerWord: document.getElementById('answerWord'),
                answerIcon: document.getElementById('answerIcon'),
                scoreDisplay: document.getElementById('scoreDisplay'),
                statusText: document.getElementById('statusText'),
                statusDot: document.getElementById('statusDot'),
                debugToggle: document.getElementById('debugToggle'),
                strictToggle: document.getElementById('strictToggle'),
            },

            // ============================================================
            //  FETCH DATA (Tries proxy first, falls back directly to API)
            // ============================================================
            fetchAllData: async function() {
                try {
                    // Update status: Reading from Local Cache
                    this.setStatus('READING CACHED DATA...', 'loading');

                    // 1. Attempt Vercel Edge Serverless Caching Layer
                    const r = await fetch(this.PROXY_URL);
                    if (!r.ok) {
                        throw new Error(`Proxy returned status: ${r.status}`);
                    }
                    const j = await r.json();
                    return this.parseResponse(j);
                } catch (proxyError) {
                    console.warn("Vercel API Cache unreachable or incompatible, falling back directly to Tarkov API:", proxyError);
                    
                    // Update status: Fetching from Online API directly
                    this.setStatus('GETTING ONLINE DATA...', 'loading');

                    // 2. Direct Fallback connection to tarkov.dev
                    const q = `
                    query {
                        items {
                            id
                            name
                            shortName
                            iconLink
                            wikiLink
                            types
                            category { name }
                        }
                        traders {
                            id
                            name
                            imageLink
                            image4xLink
                        }
                    }
                    `;
                    
                    const r = await fetch(this.FALLBACK_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: q })
                    });
                    
                    const j = await r.json();
                    if (j.errors) throw new Error(j.errors[0].message);
                    return this.parseResponse(j);
                }
            },

            // Safe parsing of both direct API payloads and proxy payloads
            parseResponse: function(jsonPayload) {
                let items = [];
                let traders = [];
                if (jsonPayload && jsonPayload.data) {
                    // Support both standard items format and custom pvp proxy format
                    if (jsonPayload.data.items) {
                        items = jsonPayload.data.items;
                    } else if (jsonPayload.data.pvp) {
                        items = jsonPayload.data.pvp;
                    }
                    traders = jsonPayload.data.traders || [];
                }
                return { items, traders };
            },

            // ============================================================
            //  BUILD WORD POOL
            // ============================================================
            buildWordPool: function(data) {
                const words = new Set();

                const addWords = (str) => {
                    if (!str) return;
                    const parts = str.split(/[\s\-_()&,./]+/);
                    for (const p of parts) {
                        const clean = p.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                        if (clean.length === 5 && /^[a-zA-Z0-9]+$/.test(clean)) {
                            words.add(clean);
                        }
                    }
                };

                (data.items || []).forEach(item => {
                    if (item.name) addWords(item.name);
                    if (item.shortName) addWords(item.shortName);
                });
                (data.traders || []).forEach(t => {
                    if (t.name) addWords(t.name);
                });
                this.FALLBACK_WORDS.forEach(w => words.add(w.toLowerCase()));

                const result = Array.from(words).filter(w => w.length === 5);
                const alphaOnly = result.filter(w => /^[a-z]+$/.test(w));
                const alphaNum = result.filter(w => /^[a-z0-9]+$/.test(w) && !/^[a-z]+$/.test(w));
                let finalPool = [...alphaOnly];
                if (finalPool.length < 20) finalPool = [...finalPool, ...alphaNum];
                return [...new Set(finalPool)];
            },

            // ============================================================
            //  GAME LOGIC
            // ============================================================
            pickAnswer: function() {
                if (this.wordPool.length === 0) {
                    this.wordPool = [...this.FALLBACK_WORDS];
                }
                const idx = Math.floor(Math.random() * this.wordPool.length);
                const word = this.wordPool[idx];
                let associated = null;
                for (const item of this.allItems) {
                    const name = (item.name || '').toLowerCase();
                    const short = (item.shortName || '').toLowerCase();
                    if (name.includes(word) || short === word || name === word) {
                        associated = { type: 'item', data: item };
                        break;
                    }
                }
                if (!associated) {
                    for (const t of this.allTraders) {
                        const name = (t.name || '').toLowerCase();
                        if (name.includes(word) || name === word) {
                            associated = { type: 'trader', data: t };
                            break;
                        }
                    }
                }
                return { word, associated };
            },

            initGame: function() {
                this.currentRow = 0;
                this.currentCol = 0;
                this.guesses = [];
                this.gameOver = false;
                this.win = false;
                this.isPlaying = true;

                const answer = this.pickAnswer();
                this.answerWord = answer.word;
                this.answerItem = answer.associated;

                this.el.feedbackArea.innerHTML = '';
                this.el.answerReveal.classList.remove('visible');
                this.el.answerWord.textContent = '—';
                this.el.answerIcon.style.display = 'none';

                this.buildGrid();
                this.buildKeyboard();
                this.updateScore();
                this.updateTileFocus();
                this.setKeyboardEnabled(true);
                this.setStatus('playing', 'ready');

                if (this.debugMode && this.answerWord) {
                    this.el.feedbackArea.innerHTML =
                        `<span class="hint-text">🔍 INTEL: ${this.answerWord.toUpperCase()}</span>`;
                }
            },

            buildGrid: function() {
                const grid = this.el.wordleGrid;
                grid.innerHTML = '';
                grid.classList.add('active');

                for (let row = 0; row < 6; row++) {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'grid-row';
                    rowDiv.dataset.row = row;
                    for (let col = 0; col < 5; col++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.dataset.row = row;
                        tile.dataset.col = col;
                        tile.textContent = '';
                        rowDiv.appendChild(tile);
                    }
                    grid.appendChild(rowDiv);
                }
            },

            getTile: function(row, col) {
                const grid = this.el.wordleGrid;
                const rowDiv = grid.querySelector(`.grid-row[data-row="${row}"]`);
                if (!rowDiv) return null;
                return rowDiv.querySelector(`.tile[data-col="${col}"]`);
            },

            getRowTiles: function(row) {
                const grid = this.el.wordleGrid;
                const rowDiv = grid.querySelector(`.grid-row[data-row="${row}"]`);
                if (!rowDiv) return [];
                return Array.from(rowDiv.querySelectorAll('.tile'));
            },

            updateTileFocus: function() {
                Array.from(document.querySelectorAll('.tile.active')).forEach(t => t.classList.remove('active'));
                if (this.gameOver) return;
                if (this.currentRow >= 6) return;
                const tile = this.getTile(this.currentRow, this.currentCol);
                if (tile) tile.classList.add('active');
            },

            handleKey: function(key) {
                if (this.gameOver || !this.isPlaying || this.isLoading) return;

                const lower = key.toLowerCase();

                if (lower === 'enter') {
                    this.submitGuess();
                    return;
                }

                if (lower === 'backspace') {
                    this.deleteLetter();
                    return;
                }

                if (/^[a-zA-Z0-9]$/.test(lower) && lower.length === 1) {
                    this.addLetter(lower);
                }
            },

            addLetter: function(char) {
                if (this.gameOver) return;
                if (this.currentRow >= 6) return;
                if (this.currentCol >= 5) return;

                const tile = this.getTile(this.currentRow, this.currentCol);
                if (tile) {
                    tile.textContent = char.toUpperCase();
                    tile.classList.add('filled');
                    this.currentCol++;
                    this.updateTileFocus();
                }
            },

            deleteLetter: function() {
                if (this.gameOver) return;
                if (this.currentRow >= 6) return;
                if (this.currentCol === 0) return;

                this.currentCol--;
                const tile = this.getTile(this.currentRow, this.currentCol);
                if (tile) {
                    tile.textContent = '';
                    tile.classList.remove('filled');
                    this.updateTileFocus();
                }
            },

            submitGuess: function() {
                try {
                    if (this.gameOver) return;
                    if (this.currentRow >= 6) return;

                    if (this.currentCol < 5) {
                        const tiles = this.getRowTiles(this.currentRow);
                        tiles.forEach(t => {
                            t.classList.add('shake');
                            setTimeout(() => t.classList.remove('shake'), 500);
                        });
                        this.el.feedbackArea.innerHTML =
                            `<span style="color:var(--wrong);">insufficient characters</span>`;
                        setTimeout(() => {
                            if (!this.gameOver) {
                                if (this.debugMode) {
                                    this.el.feedbackArea.innerHTML = `<span class="hint-text">🔍 INTEL: ${this.answerWord.toUpperCase()}</span>`;
                                } else {
                                    this.el.feedbackArea.innerHTML = '';
                                }
                            }
                        }, 1200);
                        return;
                    }

                    const tiles = this.getRowTiles(this.currentRow);
                    let guess = '';
                    tiles.forEach(t => guess += (t.textContent || '').toLowerCase().trim());

                    if (this.strictMode && !this.wordPool.includes(guess) && !this.FALLBACK_WORDS.includes(guess)) {
                        this.el.feedbackArea.innerHTML =
                            `<span style="color:var(--wrong);">invalid database reference</span>`;
                        tiles.forEach(t => {
                            t.classList.add('shake');
                            setTimeout(() => t.classList.remove('shake'), 500);
                        });
                        setTimeout(() => {
                            if (!this.gameOver) {
                                if (this.debugMode) {
                                    this.el.feedbackArea.innerHTML = `<span class="hint-text">🔍 INTEL: ${this.answerWord.toUpperCase()}</span>`;
                                } else {
                                    this.el.feedbackArea.innerHTML = '';
                                }
                            }
                        }, 1400);
                        return;
                    }

                    this.guesses.push(guess);

                    const answerWord = this.answerWord || 'killa';
                    const guessArr = guess.split('');
                    const status = Array(5).fill('absent');

                    const letterCounts = {};
                    for (let char of answerWord) {
                        letterCounts[char] = (letterCounts[char] || 0) + 1;
                    }

                    for (let i = 0; i < 5; i++) {
                        if (guessArr[i] === answerWord[i]) {
                            status[i] = 'correct';
                            letterCounts[guessArr[i]]--;
                        }
                    }

                    for (let i = 0; i < 5; i++) {
                        if (status[i] === 'correct') continue;
                        const char = guessArr[i];
                        if (letterCounts[char] && letterCounts[char] > 0) {
                            status[i] = 'present';
                            letterCounts[char]--;
                        }
                    }

                    tiles.forEach((tile, idx) => {
                        setTimeout(() => {
                            tile.classList.remove('active');
                            tile.classList.add(status[idx]);
                            this.updateKeyboardKey(guessArr[idx], status[idx]);
                        }, idx * 120 + 100);
                    });

                    const isWin = guess === answerWord;
                    if (isWin) {
                        this.win = true;
                        this.gameOver = true;
                        this.score += 1;
                        this.updateScore();
                        setTimeout(() => {
                            this.el.feedbackArea.innerHTML =
                                `<span class="correct-text">✓ DECRYPTION SECURED!</span> <span class="sub-text">+1 win</span>`;
                            this.revealAnswer();
                            this.setKeyboardEnabled(false);
                            this.showPlayAgain();
                        }, 800);
                        this.currentRow++;
                        this.currentCol = 0;
                        return;
                    }

                    this.currentRow++;
                    this.currentCol = 0;

                    if (this.currentRow >= 6) {
                        this.gameOver = true;
                        setTimeout(() => {
                            this.el.feedbackArea.innerHTML =
                                `<span class="wrong-text">✗ OUT OF TRIES</span> <span class="sub-text">→ TARGET: ${answerWord.toUpperCase()}</span>`;
                            this.revealAnswer();
                            this.setKeyboardEnabled(false);
                            this.showPlayAgain();
                        }, 800);
                        return;
                    }

                    setTimeout(() => {
                        this.updateTileFocus();
                        if (this.debugMode) {
                            this.el.feedbackArea.innerHTML = `<span class="hint-text">🔍 INTEL: ${this.answerWord.toUpperCase()}</span>`;
                        } else {
                            this.el.feedbackArea.innerHTML = '';
                        }
                    }, 700);

                } catch (gameErr) {
                    console.error("Game evaluation error:", gameErr);
                    this.el.feedbackArea.innerHTML = `<span style="color:var(--wrong);">Evaluation Error</span>`;
                }
            },

            buildKeyboard: function() {
                const kb = this.el.keyboard;
                kb.innerHTML = '';
                kb.classList.add('active');

                const rows = [
                    ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
                    ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
                    ['backspace', 'z', 'x', 'c', 'v', 'b', 'n', 'm', 'enter']
                ];

                rows.forEach(row => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'kb-row';
                    row.forEach(key => {
                        const btn = document.createElement('button');
                        btn.className = 'kb-key';
                        if (key === 'backspace' || key === 'enter') {
                            btn.classList.add('wide');
                        }
                        btn.dataset.key = key;

                        let label = key.toUpperCase();
                        if (key === 'backspace') label = '⌫';
                        else if (key === 'enter') label = '↵';
                        btn.textContent = label;

                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            if (this.gameOver || !this.isPlaying) return;
                            if (key === 'backspace') this.deleteLetter();
                            else if (key === 'enter') this.submitGuess();
                            else this.addLetter(key);
                        });
                        rowDiv.appendChild(btn);
                    });
                    kb.appendChild(rowDiv);
                });

                this.keyMap = {};
                Array.from(document.querySelectorAll('.kb-key')).forEach(btn => {
                    const k = btn.dataset.key;
                    if (k) this.keyMap[k] = btn;
                });

                this.setKeyboardEnabled(true);
            },

            setKeyboardEnabled: function(enabled) {
                Array.from(document.querySelectorAll('.kb-key')).forEach(btn => {
                    btn.disabled = !enabled;
                });
            },

            updateKeyboardKey: function(char, status) {
                const key = char.toLowerCase();
                const btn = this.keyMap?.[key];
                if (!btn) return;
                if (status === 'correct') {
                    btn.className = 'kb-key correct';
                } else if (status === 'present' && !btn.classList.contains('correct')) {
                    btn.className = 'kb-key present';
                } else if (status === 'absent' && !btn.classList.contains('correct') && !btn.classList.contains('present')) {
                    btn.className = 'kb-key absent';
                }
            },

            revealAnswer: function() {
                const reveal = this.el.answerReveal;
                this.el.answerWord.textContent = this.answerWord.toUpperCase();
                const icon = this.el.answerIcon;
                if (this.answerItem) {
                    const url = this.answerItem.data.iconLink || this.answerItem.data.image4xLink || this.answerItem.data.imageLink || null;
                    if (url) {
                        icon.src = url;
                        icon.style.display = 'inline-block';
                        icon.onerror = () => { icon.style.display = 'none'; };
                    } else {
                        icon.style.display = 'none';
                    }
                } else {
                    icon.style.display = 'none';
                }
                reveal.classList.add('visible');
            },

            showPlayAgain: function() {
                const fb = this.el.feedbackArea;
                const btn = document.createElement('button');
                btn.textContent = '[ redeploy ]';
                btn.style.cssText = `
                    background: transparent;
                    border: 1px solid var(--border-color);
                    color: var(--text-primary);
                    font-family: inherit;
                    font-size: 0.75rem;
                    text-transform: uppercase;
                    letter-spacing: 0.08em;
                    padding: 6px 18px;
                    cursor: pointer;
                    margin-left: 12px;
                    transition: all 0.3s var(--transition-curve);
                    border-radius: 4px;
                `;
                btn.onmouseover = () => { btn.style.borderColor = 'rgba(255,255,255,0.4)'; btn.style.background = 'rgba(255,255,255,0.02)'; };
                btn.onmouseout = () => { btn.style.borderColor = 'var(--border-color)'; btn.style.background = 'transparent'; };
                btn.onclick = () => this.startGame();
                fb.appendChild(btn);
            },

            startGame: function() {
                if (this.isLoading) return;
                this.isLoading = true;
                this.isPlaying = true;

                this.el.startScreen.style.display = 'none';
                this.el.wordleGrid.classList.add('active');
                this.el.keyboard.classList.add('active');
                this.el.feedbackArea.innerHTML = '';
                this.el.answerReveal.classList.remove('visible');

                Array.from(document.querySelectorAll('.kb-key')).forEach(btn => {
                    btn.className = 'kb-key';
                    btn.disabled = false;
                });

                this.initGame();
                this.isLoading = false;
                this.setStatus('playing', 'ready');
            },

            updateScore: function() {
                this.el.scoreDisplay.textContent = this.score;
            },

            setStatus: function(text, state) {
                const el = this.el.statusText;
                const dot = this.el.statusDot;
                if (el) el.textContent = text;
                if (dot) {
                    dot.className = 'dot';
                    if (state === 'loading') dot.classList.add('loading');
                    if (state === 'ready') dot.classList.add('ready');
                }
            },

            init: async function() {
                this.setStatus('INITIALIZING...', 'loading');
                this.el.startBtn.disabled = true;
                this.el.wordCount.textContent = 'Syncing...';

                try {
                    let data = null;
                    try {
                        data = await this.fetchAllData();
                    } catch (apiError) {
                        console.warn("API Call failed, falling back to offline game cache:", apiError);
                        data = {
                            items: this.FALLBACK_WORDS.map((w, index) => ({
                                id: String(index),
                                name: w,
                                shortName: w,
                                iconLink: null,
                                wikiLink: null,
                                types: [],
                                category: { name: "fallback" }
                            })),
                            traders: []
                        };
                    }

                    this.allItems = data.items || [];
                    this.allTraders = data.traders || [];
                    this.wordPool = this.buildWordPool(data);
                    if (this.wordPool.length < 10) {
                        this.wordPool = [...this.FALLBACK_WORDS];
                    }

                    this.el.wordCount.textContent = `${this.wordPool.length} indicators online`;
                    this.el.startBtn.disabled = false;
                    this.el.startBtn.textContent = '[ play ]';
                    this.el.startIcon.textContent = '🎯';
                    this.el.startTitle.textContent = 'Tarkov Wordle';
                    this.el.startSub.textContent =
                        `Decipher the 5‑letter military term in 6 tries. ${this.wordPool.length} active variations loaded.`;

                    this.setStatus('READY', 'ready');

                    this.el.debugToggle.addEventListener('change', () => {
                        this.debugMode = this.el.debugToggle.querySelector('input').checked;
                        if (this.debugMode && this.answerWord && !this.gameOver) {
                            this.el.feedbackArea.innerHTML =
                                `<span class="hint-text">🔍 INTEL: ${this.answerWord.toUpperCase()}</span>`;
                        } else if (!this.debugMode) {
                            if (!this.gameOver) this.el.feedbackArea.innerHTML = '';
                        }
                    });

                    this.el.strictToggle.addEventListener('change', () => {
                        this.strictMode = this.el.strictToggle.querySelector('input').checked;
                    });

                    this.el.startBtn.addEventListener('click', () => this.startGame());

                    document.addEventListener('keydown', (e) => {
                        if (!this.isPlaying || this.gameOver) return;
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            this.handleKey('enter');
                        } else if (e.key === 'Backspace') {
                            e.preventDefault();
                            this.handleKey('backspace');
                        } else if (e.key.length === 1 && /^[a-zA-Z0-9]$/.test(e.key)) {
                            this.handleKey(e.key);
                        }
                    });

                } catch (err) {
                    console.error('Init error:', err);
                    this.setStatus('API ERROR', '');
                    this.el.startBtn.disabled = true;
                    this.el.wordCount.textContent = '⚠️ sync failed';
                    document.querySelector('.game-area').innerHTML += `
                        <div id="initErrorPanel" style="color:var(--wrong);font-family:inherit;font-size:12px;text-align:center;padding:16px;">
                          ${err.message || 'unknown connection error'}
                          <br />
                          <button onclick="document.getElementById('initErrorPanel').remove(); WordleApp.init()" style="background:transparent;border:1px solid var(--border-color);color:var(--text-primary);padding:6px 20px;margin-top:8px;cursor:pointer;border-radius:4px;">
                            ↻ retry connection
                          </button>
                        </div>
                    `;
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => WordleApp.init());
    </script>
</body>
