<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarkov Trivia · Multiple Choice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ==========================================================================
           THEME & GLOBAL VARIABLES (Matching parent index aesthetics)
           ========================================================================== */
        :root {
            --bg-color: #030303;
            --surface-color: rgba(18, 18, 18, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;

            --correct: #10b981;    /* Sleek Emerald Green */
            --present: #f59e0b;    /* Sleek Amber Gold */
            --wrong: #ef4444;      /* Sleek Red */
            --absent: #27272a;     /* Deep Zinc Gray */

            --border-radius: 16px;
            --tile-radius: 12px;
            --transition-curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 120%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Scrollbar aesthetics */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .app {
            max-width: 850px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.8s var(--transition-curve);
        }

        /* ==========================================================================
           TOP NAVIGATION ROW & GLASSMORPHIC HEADER
           ========================================================================== */
        .top-row {
            display: flex;
            gap: 12px;
            width: 100%;
            align-items: stretch;
        }

        .back-btn-square {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            width: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s var(--transition-curve);
            cursor: pointer;
            text-decoration: none;
            flex-shrink: 0;
        }

        .back-btn-square:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: scale(1.05);
        }

        .header {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            flex: 1;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .header-title {
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #ffffff;
        }
        .header-title span {
            font-weight: 300;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-score {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 4px 14px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-score .score-value {
            font-weight: 700;
            color: #ffffff;
        }

        .header-lives {
            font-size: 0.75rem;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 4px 14px;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.01);
            letter-spacing: 2px;
            min-width: 80px;
            text-align: center;
        }

        /* Modernized Custom Toggles */
        .debug-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            user-select: none;
        }
        .debug-toggle input[type="checkbox"] {
            appearance: none;
            width: 24px;
            height: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s var(--transition-curve);
        }
        .debug-toggle input[type="checkbox"]::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            transition: all 0.3s var(--transition-curve);
        }
        .debug-toggle input[type="checkbox"]:checked {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        .debug-toggle input[type="checkbox"]:checked::after {
            left: 12px;
            background: #ffffff;
        }

        .header-status {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.01);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-status .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            transition: background 0.3s;
        }
        .header-status .dot.loading {
            background: #ffffff;
            box-shadow: 0 0 8px #ffffff;
            animation: blink 0.9s step-end infinite;
        }
        .header-status .dot.ready {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ==========================================================================
           QUIZ CONTAINER
           ========================================================================== */
        .quiz-area {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            min-height: 460px;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        /* ===== SHUFFLE / PRE-START INTERFACE ===== */
        .shuffle-start {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 40px 16px;
            width: 100%;
            min-height: 320px;
            text-align: center;
        }
        .shuffle-start .shuffle-icon {
            font-size: 54px;
            line-height: 1;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
            animation: bounce-slow 4s ease-in-out infinite;
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .shuffle-start .shuffle-title {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #ffffff;
        }
        .shuffle-start .shuffle-sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 340px;
            font-weight: 300;
        }
        .shuffle-start .btn-shuffle {
            background: transparent;
            border: 1px solid var(--border-color);
            color: #ffffff;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 14px 48px;
            cursor: pointer;
            transition: all 0.3s var(--transition-curve);
            margin-top: 10px;
            display: none; /* Injected dynamically */
        }
        .shuffle-start .btn-shuffle:hover:not(:disabled) {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: scale(1.02);
        }
        .shuffle-start .btn-shuffle:active:not(:disabled) {
            transform: scale(0.98);
        }
        .shuffle-start .btn-shuffle:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ===== QUESTION AREA ===== */
        .question-display {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }
        .question-display.active {
            display: flex;
        }

        .question-title {
            font-size: 1.15rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-align: center;
            color: #ffffff;
            padding: 0 12px;
        }

        .icon-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .icon-wrapper {
            position: relative;
            display: inline-block;
        }

        .icon-box {
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--tile-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.4s var(--transition-curve);
            position: relative;
        }
        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: grayscale(0.8) brightness(1.1);
            transition: all 0.4s var(--transition-curve);
        }
        .icon-box img:hover {
            filter: grayscale(0) brightness(1.2);
            transform: scale(1.05);
        }
        .icon-box .placeholder {
            color: var(--text-muted);
            font-size: 32px;
            font-weight: 300;
        }

        .icon-box a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: inherit;
        }

        /* Ambient spinning glowing frames */
        .icon-box.shuffling {
            border-color: var(--present);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.1), inset 0 0 20px rgba(245, 158, 11, 0.05);
            animation: glow-pulse 0.3s ease-in-out infinite alternate;
        }
        @keyframes glow-pulse {
            0% { transform: scale(1.0); }
            100% { transform: scale(1.03); }
        }
        .icon-box.shuffling-fast { animation-duration: 0.08s; }
        .icon-box.shuffling-medium { animation-duration: 0.18s; }
        .icon-box.shuffling-slow { animation-duration: 0.35s; }

        .icon-box.reveal {
            border-color: #ffffff;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.08);
            animation: tile-pop 0.5s var(--transition-curve) forwards;
        }
        @keyframes tile-pop {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .icon-box.correct {
            border-color: var(--correct);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.15);
        }
        .icon-box.wrong {
            border-color: var(--wrong);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.15);
        }

        .icon-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            min-height: 14px;
        }
        .icon-label.shuffling-label {
            color: var(--present);
        }

        /* ===== CATEGORIES SELECT ===== */
        .category-selection {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 650px;
        }
        .category-selection.visible {
            display: flex;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 500;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.3s var(--transition-curve);
            text-align: center;
            min-width: 140px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: var(--tile-radius);
        }
        .cat-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-hover);
        }
        .cat-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        .cat-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .cat-btn .cat-points {
            font-weight: 300;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        /* ===== OPTIONS SELECTION ===== */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 650px;
            transition: opacity 0.4s ease;
        }
        .options-grid.hidden {
            display: none;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 400;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.3s var(--transition-curve);
            text-align: left;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            line-height: 1.4;
            border-radius: var(--tile-radius);
        }
        .option-btn .option-text {
            flex: 1;
        }
        .option-btn .option-wiki {
            color: var(--text-secondary);
            font-size: 1rem;
            text-decoration: none;
            flex-shrink: 0;
            transition: all 0.3s var(--transition-curve);
            padding: 0 4px;
        }
        .option-btn .option-wiki:hover {
            color: #ffffff;
            transform: scale(1.1);
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-hover);
        }
        .option-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-btn.selected-correct {
            border-color: var(--correct);
            background: rgba(16, 185, 129, 0.1) !important;
            color: var(--correct);
        }
        .option-btn.selected-wrong {
            border-color: var(--wrong);
            background: rgba(239, 68, 68, 0.1) !important;
            color: var(--wrong);
        }
        .option-btn.show-correct {
            border-color: var(--correct);
            background: rgba(16, 185, 129, 0.05);
        }

        /* ===== ALERTS & MESSAGES ===== */
        .feedback-area {
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 500;
            gap: 12px;
            text-align: center;
            flex-wrap: wrap;
        }
        .feedback-area .correct-text {
            color: var(--correct);
            font-weight: 600;
        }
        .feedback-area .wrong-text {
            color: var(--wrong);
            font-weight: 600;
        }
        .feedback-area .sub-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .feedback-area .shuffle-hint {
            color: var(--present);
            animation: pulse-text 0.6s ease-in-out infinite alternate;
        }
        @keyframes pulse-text {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* ===== ERROR / FALLBACK STATES ===== */
        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            grid-column: 1 / -1;
        }
        .empty-state .big {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            letter-spacing: 4px;
        }
        .empty-state .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 4px;
        }
        .empty-state button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 20px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 12px;
            border-radius: 4px;
            transition: all 0.3s var(--transition-curve);
        }
        .empty-state button:hover {
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.02);
        }

        /* ==========================================================================
           ANIMATIONS & RESPONSIVE INTERFACES
           ========================================================================== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .options-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .option-btn {
                font-size: 0.8rem;
                padding: 10px 12px;
                min-height: 48px;
            }
            .icon-box {
                width: 110px;
                height: 110px;
            }
            .quiz-area {
                padding: 24px 16px;
                min-height: 380px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-right {
                width: 100%;
                justify-content: space-between;
            }
            .header-score {
                font-size: 0.7rem;
            }
            .header-lives {
                font-size: 0.7rem;
            }
            .question-title {
                font-size: 0.95rem;
            }
            .shuffle-start .shuffle-icon {
                font-size: 44px;
            }
            .shuffle-start .btn-shuffle {
                padding: 12px 32px;
                font-size: 0.75rem;
            }
            .cat-btn {
                font-size: 0.75rem;
                padding: 12px 16px;
                min-width: 80px;
            }
        }
        @media (max-width: 400px) {
            .icon-box {
                width: 90px;
                height: 90px;
            }
            .option-btn {
                font-size: 0.75rem;
                padding: 8px 10px;
                min-height: 40px;
            }
            .feedback-area {
                font-size: 0.8rem;
            }
            .question-title {
                font-size: 0.85rem;
            }
            .cat-btn {
                font-size: 0.7rem;
                padding: 10px 12px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- TOP NAVIGATION ROW -->
        <div class="top-row">
            <!-- Back Button with premium square layout -->
            <a href="/EscapeFromTarkov/eftIndex.html" class="back-btn-square" title="Back to Index">
                <i class="fas fa-arrow-left"></i>
            </a>

            <!-- Header Frame -->
            <header class="header">
                <div>
                    <div class="header-title">Tarkov <span>Trivia</span></div>
                    <div style="font-size:9px;color:var(--text-secondary);letter-spacing:0.05em;text-transform:uppercase;margin-top:2px;">multi‑category quiz</div>
                </div>
                <div class="header-right">
                    <div class="header-score">
                        score: <span class="score-value" id="scoreDisplay">0</span>
                    </div>
                    <div class="header-lives" id="livesDisplay">❤️❤️❤️</div>
                    <label class="debug-toggle">
                        <input type="checkbox" id="debugToggle" />
                        debug
                    </label>
                    <div class="header-status">
                        <span class="dot" id="statusDot"></span>
                        <span id="statusText">initializing ...</span>
                    </div>
                </div>
            </header>
        </div>

        <div class="quiz-area" id="quizArea">
            <!-- Shuffle Start Screen -->
            <div class="shuffle-start" id="shuffleStart">
                <div class="shuffle-icon" id="startIcon">🎲</div>
                <div class="shuffle-title" id="startTitle">READY TO PLAY</div>
                <div class="shuffle-sub" id="startSub">5 question types · 10 points each</div>
                <button class="btn-shuffle" id="shuffleBtn">[ shuffle ]</button>
            </div>

            <!-- Question Display -->
            <div class="question-display" id="questionDisplay">
                <div class="question-title" id="questionTitle">What is this item?</div>

                <div class="icon-display">
                    <div class="icon-wrapper">
                        <div class="icon-box" id="iconBox">
                            <span class="placeholder">␣</span>
                        </div>
                    </div>
                    <div class="icon-label" id="iconLabel"></div>
                </div>

                <!-- Category Selection (for items) -->
                <div class="category-selection" id="categorySelection"></div>

                <!-- Options Grid -->
                <div class="options-grid hidden" id="optionsGrid">
                    <div class="empty-state">
                        <span class="big">␣</span>
                        loading ...
                    </div>
                </div>

                <div class="feedback-area" id="feedbackArea"></div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  TARKOV TRIVIA · ITEM CATEGORIES (Name, Caliber, Price)
        // ================================================================
        const TriviaApp = {
            API_URL: 'https://api.tarkov.dev/graphql',

            allItems: [],
            completeWeapons: [],
            allTraders: [],

            currentQuestion: null,
            score: 0,
            lives: 3,
            isGameOver: false, // RENAME TO AVOID OVERLAPPING WITH METHOD
            isAnswered: false,
            isLoading: false,
            isShuffling: false,
            debugMode: false,
            shuffleTimeout: null,
            advanceTimeout: null,
            countdownTimeout: null,

            // ---- DOM refs ----
            el: {
                shuffleStart: document.getElementById('shuffleStart'),
                questionDisplay: document.getElementById('questionDisplay'),
                shuffleBtn: document.getElementById('shuffleBtn'),
                startIcon: document.getElementById('startIcon'),
                startTitle: document.getElementById('startTitle'),
                startSub: document.getElementById('startSub'),
                questionTitle: document.getElementById('questionTitle'),
                iconBox: document.getElementById('iconBox'),
                iconLabel: document.getElementById('iconLabel'),
                categorySelection: document.getElementById('categorySelection'),
                optionsGrid: document.getElementById('optionsGrid'),
                feedbackArea: document.getElementById('feedbackArea'),
                scoreDisplay: document.getElementById('scoreDisplay'),
                livesDisplay: document.getElementById('livesDisplay'),
                statusText: document.getElementById('statusText'),
                statusDot: document.getElementById('statusDot'),
                debugToggle: document.getElementById('debugToggle'),
            },

            // ---- fetch data ----
            fetchAllData: async function() {
                const q = `
              query {
                items(lang: en) {
                  id
                  name
                  shortName
                  iconLink
                  wikiLink
                  basePrice
                  avg24hPrice
                  types
                  category { id name }
                  properties {
                    __typename
                    ... on ItemPropertiesWeapon {
                      caliber
                    }
                  }
                }
                traders {
                  id
                  name
                  imageLink
                }
              }
            `;
                const r = await fetch(this.API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: q })
                });
                const j = await r.json();
                if (j.errors) throw new Error(j.errors[0].message);
                return j.data;
            },

            // ---- filter complete weapons (no mods, no parts) ----
            isCompleteWeapon: function(item) {
                const types = item.types || [];
                const cat = (item.category?.name || '').toLowerCase();
                const name = (item.name || '').toLowerCase();

                const isGun = types.includes('weapon') || types.includes('gun') ||
                              cat.includes('gun') || cat.includes('firearm') ||
                              cat.includes('pistol') || cat.includes('rifle') ||
                              cat.includes('shotgun') || cat.includes('sniper') ||
                              cat.includes('smg') || cat.includes('machine gun');
                if (!isGun) return false;

                const badTypes = ['modification', 'mods', 'barrel', 'stock', 'pistolGrip',
                    'handguard', 'muzzle', 'sight', 'magazine', 'receiver',
                    'chargingHandle', 'mount', 'functionalMod'
                ];
                if (types.some(t => badTypes.includes(t))) return false;

                const kw = ['receiver', 'charging handle', 'grip', 'stock', 'barrel', 'slide',
                    'magazine', 'mount', 'sight', 'scope', 'compensator', 'silencer',
                    'suppressor', 'thread', 'adapter', 'gas block', 'handguard',
                    'foregrip', 'chassis', 'buttpad', 'handle', 'buffer tube',
                    'muzzle brake', 'pistol grip'
                ];
                if (kw.some(k => name.includes(k) || cat.includes(k))) return false;

                return true;
            },

            // ---- prepare data ----
            prepareData: function(data) {
                // Items with icon and price
                this.allItems = (data.items || []).filter(item => {
                    const hasIcon = item.iconLink && item.iconLink.length > 0;
                    const hasPrice = (item.avg24hPrice && item.avg24hPrice > 0) ||
                        (item.basePrice && item.basePrice > 0);
                    return hasIcon && hasPrice;
                });

                // Complete weapons for caliber questions
                this.completeWeapons = this.allItems.filter(item => this.isCompleteWeapon(item));

                // Traders
                this.allTraders = (data.traders || []).filter(t => t.imageLink);
            },

            // ---- helpers ----
            pickRandom: function(arr) {
                if (!arr || !arr.length) return null;
                return arr[Math.floor(Math.random() * arr.length)];
            },

            shuffle: function(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            },

            getDistractors: function(excludeId, pool, count = 3) {
                const available = pool.filter(item => item.id !== excludeId);
                const shuffled = this.shuffle(available);
                return shuffled.slice(0, count);
            },

            // ---- get image URL ----
            getImageUrl: function(entity) {
                if (!entity) return null;
                if (entity.iconLink) return entity.iconLink;
                if (entity.imageLink) return entity.imageLink;
                return null;
            },

            // ---- question generators ----
            generateItemQuestion: function() {
                const item = this.pickRandom(this.allItems);
                if (!item) return null;

                const categories = [];
                categories.push({ id: 'name', label: 'Answer by Name', points: 10, icon: '📝' });
                if (item.properties?.caliber && item.properties.caliber !== 'Caliber') {
                    categories.push({ id: 'caliber', label: 'Answer by Caliber', points: 15, icon: '🎯' });
                }
                if (item.basePrice && item.basePrice > 0) {
                    categories.push({ id: 'price', label: 'Answer by Price', points: 20, icon: '💰' });
                }

                if (categories.length === 0) return null;

                return {
                    type: 'item',
                    itemData: item,
                    categories: categories,
                    title: 'What do you want to identify?',
                    displayIcon: item,
                };
            },

            generateTraderQuestion: function() {
                if (this.allTraders.length < 4) return null;
                const correct = this.pickRandom(this.allTraders);
                if (!correct) return null;
                const distractors = this.getDistractors(correct.id, this.allTraders, 3);
                if (distractors.length < 3) return null;
                const options = this.shuffle([correct, ...distractors]);
                return {
                    type: 'trader',
                    title: 'Which trader is this?',
                    correct: correct,
                    options: options,
                    displayIcon: correct,
                    getCorrectDisplay: () => correct.name || 'Unknown Trader',
                    getOptionDisplay: (item) => item.name || 'Unknown',
                    points: 10,
                };
            },

            // ---- generate random question ----
            generateQuestion: function() {
                const generators = [
                    this.generateItemQuestion.bind(this),
                    this.generateTraderQuestion.bind(this),
                ];

                for (let attempt = 0; attempt < 10; attempt++) {
                    const gen = this.pickRandom(generators);
                    if (gen) {
                        const result = gen();
                        if (result) return result;
                    }
                }

                for (const gen of generators) {
                    const result = gen();
                    if (result) return result;
                }

                throw new Error('Unable to generate a valid question.');
            },

            // ---- display icon ----
            setIcon: function(entity, className = '') {
                const box = this.el.iconBox;
                const imgUrl = entity ? this.getImageUrl(entity) : null;

                let iconHtml = '';
                if (imgUrl) {
                    iconHtml =
                        `<img src="${imgUrl}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling?.style.display='block'" />`;
                } else {
                    iconHtml = `<span class="placeholder">␣</span>`;
                }

                const wiki = entity?.wikiLink || null;
                if (wiki) {
                    box.innerHTML =
                        `<a href="${wiki}" target="_blank" rel="noopener noreferrer" title="View on Tarkov Wiki">${iconHtml}</a>`;
                } else {
                    box.innerHTML = iconHtml;
                }

                box.className = 'icon-box' + (className ? ' ' + className : '');
            },

            // ---- render category selection (for item questions) ----
            renderCategorySelection: function(question) {
                const container = this.el.categorySelection;
                container.innerHTML = '';
                container.classList.add('visible');

                question.categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'cat-btn';
                    btn.innerHTML = `${cat.icon} ${cat.label} <span class="cat-points">(${cat.points} pts)</span>`;
                    btn.dataset.category = cat.id;
                    btn.addEventListener('click', () => this.handleCategorySelection(cat.id, question));
                    container.appendChild(btn);
                });
            },

            // ---- handle category selection ----
            handleCategorySelection: function(categoryId, question) {
                const item = question.itemData;
                let options = [];
                let correctValue = null;
                let points = 0;
                let newTitle = '';

                // Hide category selection
                this.el.categorySelection.classList.remove('visible');

                if (categoryId === 'name') {
                    const distractors = this.getDistractors(item.id, this.allItems, 3);
                    if (distractors.length < 3) return;
                    const optionItems = this.shuffle([item, ...distractors]);
                    options = optionItems.map(i => ({ text: i.name || i.shortName || 'Unknown', wiki: i.wikiLink }));
                    correctValue = item.name || item.shortName;
                    points = 10;
                    newTitle = 'What is this item?';
                } else if (categoryId === 'caliber') {
                    const calWeapons = this.completeWeapons.filter(w =>
                        w.id !== item.id &&
                        w.properties?.caliber &&
                        w.properties.caliber !== 'Caliber' &&
                        w.properties.caliber !== item.properties.caliber
                    );
                    const shuffled = this.shuffle(calWeapons);
                    const selected = shuffled.slice(0, 3);
                    const calOptions = [item, ...selected];
                    const shuffledOptions = this.shuffle(calOptions);
                    options = shuffledOptions.map(i => ({
                        text: i.properties?.caliber?.replace('Caliber', '').trim() || 'Unknown',
                        wiki: i.wikiLink
                    }));
                    correctValue = item.properties.caliber.replace('Caliber', '').trim();
                    points = 15;
                    newTitle = 'What caliber is this weapon?';
                } else if (categoryId === 'price') {
                    let distractors = this.allItems.filter(i =>
                        i.id !== item.id &&
                        i.basePrice &&
                        i.basePrice > 0
                    );
                    // Try to get close prices first
                    let closePrices = distractors.filter(i =>
                        Math.abs(i.basePrice - item.basePrice) < 50000
                    );
                    let selectedDistractors = closePrices.length >= 3 ? closePrices : distractors;
                    const shuffled = this.shuffle(selectedDistractors);
                    const selected = shuffled.slice(0, 3);
                    const priceOptions = [item, ...selected];
                    const shuffledOptions = this.shuffle(priceOptions);
                    options = shuffledOptions.map(i => ({
                        text: '₽' + (i.basePrice || 0).toLocaleString(),
                        wiki: i.wikiLink
                    }));
                    correctValue = '₽' + item.basePrice.toLocaleString();
                    points = 20;
                    newTitle = 'What is the base price of this item?';
                }

                // Update the question title
                this.el.questionTitle.textContent = newTitle;

                // Store points and correct value
                question.points = points;
                question.correctDisplay = correctValue;
                // Find which option is correct
                let correctIndex = -1;
                options.forEach((opt, idx) => {
                    if (opt.text === correctValue) {
                        correctIndex = idx;
                    }
                });

                // If not found, try comparing without ₽ for price
                if (correctIndex === -1 && categoryId === 'price') {
                    const cleanCorrect = correctValue.replace('₽', '').replace(/,/g, '');
                    options.forEach((opt, idx) => {
                        const cleanOpt = opt.text.replace('₽', '').replace(/,/g, '');
                        if (cleanOpt === cleanCorrect) correctIndex = idx;
                    });
                }

                // Render the options
                this.renderOptions(question, options, correctIndex);
            },

            // ---- render options ----
            renderOptions: function(question, options, correctIndex) {
                const grid = this.el.optionsGrid;
                grid.innerHTML = '';
                grid.classList.remove('hidden');

                const correctValue = options[correctIndex]?.text;

                options.forEach((item, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.dataset.index = index;

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'option-text';
                    nameSpan.textContent = item.text;

                    const wikiLink = document.createElement('a');
                    wikiLink.className = 'option-wiki';
                    const w = item.wiki || null;
                    wikiLink.href = w || '#';
                    wikiLink.target = '_blank';
                    wikiLink.rel = 'noopener noreferrer';
                    wikiLink.textContent = '↗';
                    wikiLink.title = 'View on Tarkov Wiki';
                    if (!w) {
                        wikiLink.style.opacity = '0.2';
                        wikiLink.style.cursor = 'default';
                        wikiLink.href = '#';
                    }

                    btn.appendChild(nameSpan);
                    btn.appendChild(wikiLink);

                    if (this.debugMode && index === correctIndex) {
                        btn.classList.add('show-correct');
                    }

                    btn.addEventListener('click', () => this.handleAnswer(index, correctIndex));
                    grid.appendChild(btn);
                });

                // Store correct index for answer handling
                this.currentQuestion.correctIndex = correctIndex;
                this.currentQuestion.points = question.points;
                this.currentQuestion.correctDisplay = correctValue;
            },

            // ---- shuffle animation ----
            performShuffle: function(displayEntity, callback) {
                const totalDuration = 2000;
                const startTime = Date.now();

                this.stopShuffle();
                this.isShuffling = true;

                const box = this.el.iconBox;
                const label = this.el.iconLabel;
                label.textContent = '🔍 revealing ...';
                label.classList.add('shuffling-label');
                this.el.feedbackArea.innerHTML = `<span class="shuffle-hint">⚡ opening ...</span>`;
                this.el.optionsGrid.classList.add('hidden');
                this.el.categorySelection.classList.remove('visible');

                let phase = 'fast';
                const shuffleStep = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / totalDuration, 1);

                    let interval;
                    let phaseClass = '';

                    if (progress < 0.3) {
                        interval = 40 + Math.random() * 30;
                        phaseClass = 'shuffling-fast';
                        if (phase !== 'fast') {
                            phase = 'fast';
                            box.className = 'icon-box shuffling ' + phaseClass;
                        }
                    } else if (progress < 0.55) {
                        interval = 80 + Math.random() * 60;
                        phaseClass = 'shuffling-medium';
                        if (phase !== 'medium') {
                            phase = 'medium';
                            box.className = 'icon-box shuffling ' + phaseClass;
                        }
                    } else if (progress < 0.8) {
                        interval = 150 + Math.random() * 120;
                        phaseClass = 'shuffling-slow';
                        if (phase !== 'slow') {
                            phase = 'slow';
                            box.className = 'icon-box shuffling ' + phaseClass;
                        }
                    } else if (progress < 0.95) {
                        interval = 250 + Math.random() * 250;
                        phaseClass = 'shuffling-slow';
                        if (phase !== 'suspense') {
                            phase = 'suspense';
                            box.className = 'icon-box shuffling ' + phaseClass;
                            label.textContent = '🎯 almost there ...';
                        }
                    } else {
                        // FINAL - show the actual item icon
                        this.setIcon(displayEntity, 'reveal');
                        label.textContent = '';
                        label.classList.remove('shuffling-label');
                        this.el.feedbackArea.innerHTML = '';
                        this.isShuffling = false;
                        if (callback) callback();
                        return;
                    }

                    // Show random item during shuffle
                    const randomItem = this.pickRandom(this.allItems);
                    const boxEl = this.el.iconBox;
                    if (randomItem && randomItem.iconLink) {
                        boxEl.innerHTML =
                            `<img src="${randomItem.iconLink}" alt="" loading="lazy" onerror="this.style.display='none'" />`;
                    } else {
                        boxEl.innerHTML = `<span class="placeholder">␣</span>`;
                    }
                    boxEl.className = 'icon-box shuffling ' + phaseClass;

                    this.shuffleTimeout = setTimeout(shuffleStep, interval);
                };

                shuffleStep();
            },

            stopShuffle: function() {
                if (this.shuffleTimeout) {
                    clearTimeout(this.shuffleTimeout);
                    this.shuffleTimeout = null;
                }
                this.isShuffling = false;
            },

            // ---- update lives display ----
            updateLivesDisplay: function() {
                const hearts = '❤️'.repeat(Math.max(0, this.lives));
                const empty = '🖤'.repeat(Math.max(0, 3 - this.lives));
                this.el.livesDisplay.textContent = hearts + empty;
            },

            // ---- game over ----
            gameOver: function() {
                this.isGameOver = true; // Use renamed property
                this.isLoading = false;
                if (this.advanceTimeout) {
                    clearTimeout(this.advanceTimeout);
                    this.advanceTimeout = null;
                }
                this.stopShuffle();

                this.el.questionDisplay.classList.remove('active');
                this.el.shuffleStart.style.display = 'flex';
                this.el.startIcon.textContent = '💀';
                this.el.startTitle.textContent = 'GAME OVER';
                this.el.startSub.textContent = `final score: ${this.score}`;
                this.el.shuffleBtn.textContent = '[ play again ]';
                this.el.shuffleBtn.style.display = 'block';
                this.el.shuffleBtn.onclick = () => this.startGame();

                this.setStatus('game over', '');
            },

            // ---- render question ----
            renderQuestion: function(question) {
                if (!question) return;

                this.currentQuestion = question;
                this.isAnswered = false;

                this.el.shuffleStart.style.display = 'none';
                this.el.questionDisplay.classList.add('active');

                this.el.questionTitle.textContent = question.title;

                // Reset icon to placeholder
                this.setIcon(null);
                this.el.iconLabel.textContent = '';

                this.el.optionsGrid.classList.add('hidden');
                this.el.categorySelection.classList.remove('visible');
                this.el.feedbackArea.innerHTML = '';

                // Start shuffle with the display icon
                this.performShuffle(question.displayIcon, () => {
                    // After shuffle completes
                    if (question.type === 'trader') {
                        this.el.iconLabel.textContent = '';
                        // Render options directly for trader
                        const options = question.options.map(i => ({
                            text: question.getOptionDisplay(i),
                            wiki: i.wikiLink
                        }));
                        let correctIndex = -1;
                        question.options.forEach((opt, idx) => {
                            if (opt.id === question.correct.id) correctIndex = idx;
                        });
                        this.renderOptions(question, options, correctIndex);
                        this.el.feedbackArea.innerHTML = '';
                    } else if (question.type === 'item') {
                        // Show category selection
                        this.el.iconLabel.textContent = '🎯 choose a category';
                        this.renderCategorySelection(question);
                        this.el.feedbackArea.innerHTML = '';
                    }
                });
            },

            // ---- handle answer ----
            handleAnswer: function(index, correctIndex) {
                if (this.isAnswered || this.isLoading || this.isShuffling || this.isGameOver) return; // Use renamed property
                this.isAnswered = true;

                const isCorrect = index === correctIndex;
                const points = this.currentQuestion.points || 0;

                const btns = this.el.optionsGrid.querySelectorAll('.option-btn');
                btns.forEach((btn, i) => {
                    btn.disabled = true;
                    if (i === correctIndex) {
                        btn.classList.add('show-correct');
                    }
                    if (i === index) {
                        if (isCorrect) {
                            btn.classList.add('selected-correct');
                        } else {
                            btn.classList.add('selected-wrong');
                        }
                    }
                });

                const box = this.el.iconBox;
                const fb = this.el.feedbackArea;
                const correctDisplay = this.currentQuestion.correctDisplay || 'Unknown';

                if (isCorrect) {
                    box.classList.add('correct');
                    if (!this.debugMode) {
                        this.score += points;
                        this.el.scoreDisplay.textContent = this.score;
                    }
                    fb.innerHTML = `<span class="correct-text">✓ CORRECT!</span> <span class="sub-text">(+${points} pts)</span>`;
                } else {
                    box.classList.add('wrong');
                    if (!this.debugMode) {
                        this.lives -= 1;
                        this.updateLivesDisplay();
                        if (this.lives === 0) {
                            this.gameOver(); // Correctly fires the gameOver method
                            return;
                        }
                    }
                    fb.innerHTML =
                        `<span class="wrong-text">✗ WRONG</span> <span class="sub-text">→ ${correctDisplay}</span>`;
                }

                this.isLoading = true;
                if (this.advanceTimeout) clearTimeout(this.advanceTimeout);
                this.advanceTimeout = setTimeout(() => {
                    if (this.isGameOver) return; // Use renamed property
                    this.isLoading = false;
                    this.nextQuestion();
                }, 2000);
            },

            // ---- next question ----
            nextQuestion: function() {
                try {
                    const q = this.generateQuestion();
                    if (q) {
                        this.renderQuestion(q);
                    } else {
                        this.el.feedbackArea.innerHTML =
                            `<span style="color:var(--wrong);">⚠️ no more questions available</span>`;
                    }
                } catch (err) {
                    console.warn('Failed to generate question:', err);
                    this.el.optionsGrid.innerHTML = `
                <div class="empty-state">
                  <span class="big">⚠️</span>
                  ${err.message || 'Failed to generate question'}
                  <div class="sub">try again</div>
                </div>
              `;
                    this.el.feedbackArea.innerHTML = `<span style="color:var(--wrong);">error: ${err.message}</span>`;
                }
            },

            // ---- start game ----
            startGame: function() {
                if (this.isLoading) return;
                this.isLoading = true;

                // Reset state
                this.lives = 3;
                this.score = 0;
                this.isGameOver = false; // Use renamed property
                this.updateLivesDisplay();
                this.el.scoreDisplay.textContent = '0';

                // Reset shuffle start to default
                this.el.startIcon.textContent = '🎲';
                this.el.startTitle.textContent = 'READY TO PLAY';
                this.el.startSub.textContent = '5 question types · 10 points each';
                this.el.shuffleBtn.style.display = 'none';

                // Hide start, show question
                this.el.shuffleStart.style.display = 'none';
                this.el.questionDisplay.classList.add('active');

                try {
                    const q = this.generateQuestion();
                    if (q) {
                        this.renderQuestion(q);
                    } else {
                        throw new Error('Unable to generate first question.');
                    }
                } catch (err) {
                    console.error('Start error:', err);
                    this.el.feedbackArea.innerHTML = `<span style="color:var(--wrong);">⚠️ ${err.message}</span>`;
                }

                this.isLoading = false;
                this.setStatus('playing', 'ready');
            },

            // ---- countdown to start ----
            startCountdown: function() {
                this.el.shuffleStart.style.display = 'flex';
                this.el.questionDisplay.classList.remove('active');
                this.el.shuffleBtn.style.display = 'none';

                this.el.startIcon.textContent = '⏳';
                this.el.startTitle.textContent = 'Ready?';
                this.el.startSub.textContent = '';

                let count = 3;
                const countdown = () => {
                    if (count > 0) {
                        this.el.startTitle.textContent = `${count}...`;
                        count--;
                        setTimeout(countdown, 1000);
                    } else {
                        this.el.startTitle.textContent = 'Let\'s go!';
                        this.el.startIcon.textContent = '🚀';
                        setTimeout(() => {
                            this.startGame();
                        }, 800);
                    }
                };
                setTimeout(countdown, 500);
            },

            // ---- set status ----
            setStatus: function(text, state) {
                const el = this.el.statusText;
                const dot = this.el.statusDot;
                if (el) el.textContent = text;
                if (dot) {
                    dot.className = 'dot';
                    if (state === 'loading') dot.classList.add('loading');
                    if (state === 'ready') dot.classList.add('ready');
                }
            },

            // ---- init ----
            init: async function() {
                this.setStatus('loading data ...', 'loading');
                this.el.shuffleBtn.style.display = 'none';
                // Ensure debug is off initially
                this.el.debugToggle.checked = false;
                this.debugMode = false;

                try {
                    const data = await this.fetchAllData();
                    this.prepareData(data);

                    if (this.allItems.length < 10) {
                        throw new Error('Not enough items loaded. Try again.');
                    }

                    this.updateLivesDisplay();

                    // Start the countdown
                    this.startCountdown();

                    this.setStatus('ready', 'ready');

                    this.el.debugToggle.addEventListener('change', () => {
                        this.debugMode = this.el.debugToggle.checked;
                        if (this.currentQuestion && !this.isAnswered && !this.isShuffling && !this.isGameOver) { // Use renamed property
                            const q = this.currentQuestion;
                            const btns = this.el.optionsGrid.querySelectorAll('.option-btn');
                            if (q.correctIndex !== undefined) {
                                btns.forEach((btn, i) => {
                                    if (this.debugMode && i === q.correctIndex) {
                                        btn.classList.add('show-correct');
                                    } else {
                                        btn.classList.remove('show-correct');
                                    }
                                });
                            }
                        }
                    });

                } catch (err) {
                    console.error('Init error:', err);
                    this.setStatus('error', '');
                    document.querySelector('.quiz-area').innerHTML = `
                <div class="empty-state" style="grid-column:1/-1;padding:60px 20px;">
                  <span class="big">✖</span>
                  failed to load data
                  <div class="sub">${err.message || 'unknown error'}</div>
                  <button onclick="TriviaApp.init()">↻ retry</button>
                </div>
              `;
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => TriviaApp.init());
    </script>
