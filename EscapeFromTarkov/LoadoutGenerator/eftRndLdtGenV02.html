<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarkov Loadout Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-alt: #111111;
            --border: #333333;
            --border-light: #555555;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --text-muted: #666666;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --mono: "JetBrains Mono", Consolas, "Courier New", monospace;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app {
            max-width: 1400px; /* Increased from 1200px to allow slots to expand wider on desktops */
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        /* ---- Header & Standalone Back Button Layout ---- */
        .header-wrapper {
            display: flex;
            gap: 12px;
            align-items: stretch;
            width: 100%;
        }

        .back-btn-standalone {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-main);
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .back-btn-standalone:hover {
            background: var(--text-main);
            color: var(--bg);
            border-color: var(--text-main);
        }

        .header {
            flex: 1;
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            min-width: 0; /* Prevents flex items from breaking layout boundaries */
        }

        .header-title {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-main);
        }
        .header-title span {
            font-weight: 400;
            color: var(--text-dim);
        }
        .header-sub {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 4px;
            font-family: var(--mono);
            text-transform: uppercase;
        }

        .header-status {
            font-size: 13px;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 6px 16px;
            font-family: var(--mono);
            letter-spacing: 0.5px;
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: background 0.2s;
        }
        .header-status .dot.loading {
            background: var(--text-muted);
            animation: pulse 1s infinite alternate;
        }
        .header-status .dot.ready {
            background: var(--text-main);
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* ---- Controls & Cost ---- */
        .controls-row {
            display: flex;
            gap: 16px;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .cost-bar {
            flex: 1;
            display: flex;
            border: 1px solid var(--border);
            background: var(--surface);
        }
        .cost-card {
            flex: 1;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .cost-card:first-child {
            border-right: 1px solid var(--border);
        }
        .cost-card .cost-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            font-family: var(--mono);
            margin-bottom: 4px;
        }
        .cost-card .cost-value {
            font-family: var(--mono);
            font-size: 26px;
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            align-items: center;
            min-height: 38px;
        }
        .cost-card .cost-tag {
            font-size: 11px;
            color: var(--bg);
            background: var(--text-dim);
            font-weight: bold;
            font-family: var(--mono);
            padding: 2px 8px;
            text-transform: uppercase;
        }

        /* ---- Reels (Strict Square Line, Dynamic Flex Scaling) ---- */
        .reels {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: hidden; /* Prevent horizontal scrollbars completely */
            gap: 8px; /* Compact gap to ensure 10 items fit */
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 14px; /* Scaled from 10px -> 14px to give more space for slots */
            transition: opacity 0.3s;
            width: 100%;
        }
        .reels.hidden {
            display: none;
        }

        .reel {
            border: 1px solid var(--border);
            background: var(--bg);
            padding: 8px; /* Increased inside padding slightly */
            text-align: center;
            aspect-ratio: 1 / 1; /* Forcing absolute square ratios */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.25s, opacity 0.2s, background-color 0.25s, box-shadow 0.25s;
            position: relative;
            flex: 1 1 0%; /* Scale smoothly to always fit, never overshoot */
            min-width: 0; /* Allows shrinking below inherent content widths */
        }
        .reel.spinning {
            border-color: var(--text-main);
            border-width: 2px;
        }
        .reel.stopped {
            border-color: var(--border);
        }
        .reel.disabled {
            opacity: 0.4;
            border-color: var(--border);
        }
        .reel.highlighted-reel {
            border-color: var(--text-main);
            background-color: var(--surface-alt);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
        }

        .reel .reel-toggle {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 17px; /* Scaled 140% -> 17px for readability */
            cursor: pointer;
            color: var(--text-dim);
            user-select: none;
            transition: color 0.2s;
            z-index: 2;
        }
        .reel .reel-toggle:hover { color: var(--text-main); }
        .reel .reel-toggle.checked { color: var(--text-main); }

        .reel .reel-index {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 11px; /* Scaled 140% -> 11px for readability */
            color: var(--text-muted);
            font-family: var(--mono);
            z-index: 2;
        }

        .reel .cat-label {
            font-size: 12px; /* Scaled 140% -> 12px for readability */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 3px 6px; /* Increased padding slightly */
            background: var(--surface-alt);
            font-family: var(--mono);
            margin-bottom: 0px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 1;
        }

        .reel .reel-icon {
            width: 100%;
            height: calc(100% - 26px); /* Adjusted to keep square aspect clean with larger header fonts */
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            overflow: hidden;
            padding: 2px;
            margin-top: 2px;
        }
        .reel .reel-icon img {
            max-width: 98%;
            max-height: 98%;
            object-fit: contain;
            filter: grayscale(1) contrast(1.2);
            transition: transform 0.2s ease;
        }
        .reel:not(.disabled):hover .reel-icon img {
            transform: scale(1.08);
        }
        .reel .reel-icon .placeholder {
            color: var(--text-muted);
            font-size: 34px; /* Scaled 140% -> 34px for readability */
            font-family: var(--mono);
        }

        /* ---- Buttons Area ---- */
        .spin-area {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-spin, .btn-save, .btn-clear {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-family: var(--mono);
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0 32px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 56px;
            justify-content: center;
        }
        .btn-spin {
            flex: 2;
            min-width: 200px;
            background: var(--text-main);
            color: var(--bg);
            border-color: var(--text-main);
        }
        .btn-spin:hover:not(:disabled) { background: #dcdcdc; }
        .btn-save, .btn-clear { flex: 1; min-width: 120px; }
        .btn-save:hover:not(:disabled), .btn-clear:hover:not(:disabled) {
            background: var(--text-main);
            color: var(--bg);
            border-color: var(--text-main);
        }
        
        .btn-spin:disabled, .btn-save:disabled, .btn-clear:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: var(--bg);
            color: var(--text-muted);
            border-color: var(--border);
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }

        /* Price Loading Spinner */
        .price-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-light);
            border-top-color: var(--text-main);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ---- Details Panel ---- */
        .details {
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 24px;
            display: none; /* Hidden by default initially and when cleared */
        }

        .details-head {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .details-head::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .loadout-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .loadout-item {
            border: 1px solid var(--border);
            background: var(--bg);
            padding: 16px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: border-color 0.25s, background-color 0.25s, box-shadow 0.25s;
        }
        .loadout-item:hover {
            border-color: var(--border-light);
        }
        .loadout-item.highlighted {
            border-color: var(--text-main);
            background-color: var(--surface-alt);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
        }

        .loadout-item .li-icon {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 4px;
        }
        .loadout-item .li-icon img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            filter: grayscale(1) contrast(1.2);
            transition: filter 0.3s;
        }
        .loadout-item .li-icon .placeholder {
            color: var(--text-muted);
            font-size: 20px;
        }

        .loadout-item .li-content {
            flex: 1;
            min-width: 0;
        }
        .loadout-item .li-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }
        .loadout-item .li-name-link {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 1px dotted var(--border-light);
            display: inline-block;
            max-width: 100%;
            line-height: 1.3;
        }
        .loadout-item .li-name-link:hover {
            border-bottom-color: var(--text-main);
        }

        .loadout-item .li-cat {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            font-family: var(--mono);
            margin-top: 4px;
        }

        .loadout-item .li-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-top: 12px;
            font-size: 11px;
            font-family: var(--mono);
        }
        .loadout-item .li-stats .stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .loadout-item .li-stats .stat-label {
            color: var(--text-dim);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .loadout-item .li-stats .stat-value {
            color: var(--text-main);
            font-weight: bold;
        }
        .loadout-item .li-stats .stat-value a {
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 1px dotted var(--border-light);
        }
        .loadout-item .li-stats .stat-value a:hover {
            border-bottom-color: var(--text-main);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 24px;
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 14px;
            letter-spacing: 1px;
            background: var(--bg);
            border: 1px solid var(--border);
        }
        .empty-state .big {
            font-size: 36px;
            display: block;
            margin-bottom: 12px;
            color: var(--text-muted);
            letter-spacing: 4px;
        }

        @media (max-width: 768px) {
            .header-wrapper { flex-direction: column; align-items: stretch; }
            .back-btn-standalone { width: 100%; height: 48px; }
            .controls-row { flex-direction: column; }
            .cost-card { padding: 12px 16px; }
            .cost-card .cost-value { font-size: 20px; }
            .reels { flex-wrap: wrap; overflow-x: visible; } /* Allow wrap only on small mobile viewports */
            .reel { flex: 1 1 calc(50% - 8px); }
            .spin-area { flex-direction: column; }
            .btn-spin, .btn-save, .btn-clear { width: 100%; min-height: 48px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header Wrapper with Standalone Back Button -->
        <div class="header-wrapper">
            <a href="/EscapeFromTarkov/eftIndex.html" class="back-btn-standalone" title="Back to Index">←</a>
            <header class="header">
                <div>
                    <div class="header-title">Tarkov Loadout <span>Generator</span></div>
                    <div class="header-sub">Flea-Market Only · Live Pricing</div>
                </div>
                <div class="header-status">
                    <span class="dot" id="statusDot"></span>
                    <span id="statusText">INITIALIZING...</span>
                </div>
            </header>
        </div>

        <!-- Controls Row -->
        <div class="controls-row">
            <div class="cost-bar" id="costBar">
                <div class="cost-card">
                    <div>
                        <div class="cost-label">Total PvP Value</div>
                        <div class="cost-value" id="pvpTotal">₽0</div>
                    </div>
                    <span class="cost-tag">PvP</span>
                </div>
                <div class="cost-card">
                    <div>
                        <div class="cost-label">Total PvE Value</div>
                        <div class="cost-value" id="pveTotal">₽0</div>
                    </div>
                    <span class="cost-tag">PvE</span>
                </div>
            </div>
        </div>

        <!-- Reels -->
        <div class="reels hidden" id="reelsContainer"></div>

        <!-- Action Buttons -->
        <div class="spin-area">
            <button class="btn-spin" id="spinBtn" disabled>
                <span class="btn-text">[ RANDOMIZE ]</span>
                <span class="spinner" id="spinSpinner"></span>
            </button>
            <button class="btn-save" id="saveBtn" disabled>
                <span class="btn-text">SAVE</span>
                <span class="spinner"></span>
            </button>
            <button class="btn-clear" id="clearBtn" disabled>
                <span class="btn-text">CLEAR</span>
                <span class="spinner"></span>
            </button>
        </div>

        <!-- Details panel -->
        <div class="details" id="detailsPanel">
            <div class="details-head">▸ Selected Loadout Breakdown</div>
            <div class="loadout-grid" id="loadoutGrid">
                <div class="empty-state">
                    <span class="big">␣</span>
                    PRESS [ RANDOMIZE ] TO COMPILE A LOADOUT
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  TARKOV LOADOUT ENGINE
        //  Reels Layout + Robust Substring & Type Categorization Logic
        // ================================================================
        const App = {
            API_URL: 'https://api.tarkov.dev/graphql',

            ALL_CATEGORIES: [
                'PrimaryWeapon', 'SecondaryWeapon', 'Pistol',
                'Helmet', 'Armor', 'Vest', 'Backpack',
                'Headphone', 'Face Cover', 'Eyewear'
            ],

            CAT_LABELS: {
                'PrimaryWeapon': 'Primary',
                'SecondaryWeapon': 'Secondary',
                'Pistol': 'Sidearm',
                'Helmet': 'Headwear',
                'Armor': 'Body Armor',
                'Vest': 'Tactical Rig',
                'Backpack': 'Backpack',
                'Headphone': 'Headset',
                'Face Cover': 'Face Cover',
                'Eyewear': 'Eyewear'
            },

            REEL_CATS: [
                'PrimaryWeapon', 'SecondaryWeapon', 'Pistol',
                'Helmet', 'Armor', 'Vest', 'Backpack',
                'Headphone', 'Face Cover', 'Eyewear'
            ],

            allItems: [],
            byCategory: {},
            currentLoadout: {},
            isSpinning: false,
            stoppedCount: 0,
            totalCats: 0,
            enabledCategories: {},  

            // ---- Fetch items ----
            fetchAll: async function() {
                const q = `
                query {
                    pvp: items(lang: en, gameMode: regular) {
                        id name shortName wikiLink iconLink basePrice weight avg24hPrice types
                        category { name }
                        properties { __typename
                            ... on ItemPropertiesWeapon { caliber fireRate ergonomics recoilVertical }
                            ... on ItemPropertiesArmor { class durability }
                        }
                    }
                    pve: items(lang: en, gameMode: pve) { id avg24hPrice }
                }`;

                const r = await fetch(this.API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: q })
                });
                const j = await r.json();
                if (j.errors) throw new Error(j.errors[0].message);
                
                const pvp = j.data.pvp || [];
                const pve = j.data.pve || [];
                const pveMap = {};
                for (const it of pve) pveMap[it.id] = it.avg24hPrice;
                for (const it of pvp) it.pvePrice = pveMap[it.id] || null;
                
                return pvp;
            },

            // ---- Filter out gun parts, mods, and accessories ----
            isFunctional: function(item) {
                const types = (item.types || []).map(t => t.toLowerCase());
                const name = (item.name || '').toLowerCase();
                const cat = (item.category?.name || '').toLowerCase();

                const badTypes = ['modification', 'ammo', 'magazine', 'component', 'functionalmod'];
                if (types.some(t => badTypes.includes(t))) return false;

                const badKeywords = [
                    'receiver', 'charging handle', 'grip', 'stock', 'barrel', 'slide', 'magazine',
                    'mount', 'sight', 'scope', 'compensator', 'silencer', 'suppressor', 'thread',
                    'adapter', 'gas block', 'handguard', 'foregrip', 'chassis', 'buttpad',
                    'handle', 'buffer tube', 'muzzle brake', 'barrel', 'gas tube', 'rail', 'keymod', 'mlok'
                ];
                if (badKeywords.some(k => name.includes(k) || cat.includes(k))) return false;

                return true;
            },

            // ---- Reliable categorization routing ----
            categorize: function(items) {
                const fleaItems = items.filter(i => (i.avg24hPrice > 0 || i.pvePrice > 0));

                const map = {};
                for (const c of this.ALL_CATEGORIES) map[c] = [];

                fleaItems.forEach(item => {
                    const catName = (item.category?.name || '').toLowerCase();
                    const nameLow = (item.name || '').toLowerCase();
                    const types = (item.types || []).map(t => t.toLowerCase());

                    // --- Pistol (Sidearm) ---
                    if (catName.includes('pistol') || catName.includes('handgun') || types.includes('pistol') || types.includes('handgun')) {
                        if (this.isFunctional(item)) {
                            map['Pistol'].push(item);
                        }
                        return;
                    }

                    // --- Primary / Secondary Weapons ---
                    if (catName.includes('rifle') || catName.includes('smg') || catName.includes('shotgun') || 
                        catName.includes('carbine') || catName.includes('machinegun') || catName.includes('marksman') || 
                        types.includes('weapon')) {
                        if (this.isFunctional(item)) {
                            map['PrimaryWeapon'].push(item);
                            map['SecondaryWeapon'].push(item);
                        }
                        return;
                    }

                    // --- Headset (Headphone) ---
                    if (catName.includes('headphone') || catName.includes('headset') || types.includes('headphones') || types.includes('headset')) {
                        map['Headphone'].push(item);
                        return;
                    }

                    // --- Helmet (Headwear) ---
                    if (catName.includes('headwear') || catName.includes('helmet') || types.includes('helmet')) {
                        // Keep out standalone NVG optics, visors, covers, and plates
                        if (!types.includes('modification') && !nameLow.includes('mount') && !nameLow.includes('shield') && !nameLow.includes('visor') && !nameLow.includes('plate') && !nameLow.includes('strap')) {
                            map['Helmet'].push(item);
                        }
                        return;
                    }

                    // --- Face Cover ---
                    if (catName.includes('face cover') || catName.includes('mask') || types.includes('facecover')) {
                        map['Face Cover'].push(item);
                        return;
                    }

                    // --- Armor (Body Armor) ---
                    if (catName.includes('armor') || types.includes('armor')) {
                        // Make sure it is not a helmet or tactical rig
                        if (!catName.includes('headwear') && !catName.includes('helmet') && !types.includes('helmet') && 
                            !catName.includes('rig') && !types.includes('rig') && !types.includes('chestRig') &&
                            !types.includes('modification') && !nameLow.includes('plate') && !nameLow.includes('insert')) {
                            map['Armor'].push(item);
                        }
                        return;
                    }

                    // --- Tactical Rig (Vest) ---
                    if (catName.includes('rig') || catName.includes('vest') || types.includes('rig') || types.includes('chestrig')) {
                        if (!types.includes('modification') && !nameLow.includes('plate') && !nameLow.includes('insert')) {
                            map['Vest'].push(item);
                        }
                        return;
                    }

                    // --- Backpack ---
                    if (catName.includes('backpack') || types.includes('backpack')) {
                        map['Backpack'].push(item);
                        return;
                    }

                    // --- Eyewear ---
                    if (catName.includes('glasses') || catName.includes('eyewear') || catName.includes('goggles') || types.includes('glasses') || types.includes('eyewear')) {
                        map['Eyewear'].push(item);
                        return;
                    }
                });

                // Alphabetize
                for (const k in map) {
                    map[k].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                }
                return map;
            },

            pick: function(arr) {
                if (!arr || !arr.length) return null;
                return arr[Math.floor(Math.random() * arr.length)];
            },

            getIconHtml: function(item) {
                if (item?.iconLink) {
                    return `<img src="${item.iconLink}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling?.style.display='block'" />`;
                } else {
                    return `<span class="placeholder">∅</span>`;
                }
            },

            getStats: function(item) {
                const lines = [];
                if (item.avg24hPrice) lines.push({ label: 'PvP', value: '₽' + item.avg24hPrice.toLocaleString() });
                if (item.pvePrice) lines.push({ label: 'PvE', value: '₽' + item.pvePrice.toLocaleString() });
                if (item.weight) lines.push({ label: 'Weight', value: item.weight + 'kg' });
                
                const p = item?.properties;
                if (p) {
                    if (p.caliber) {
                        const cal = p.caliber.replace('Caliber', '').trim();
                        lines.push({
                            label: 'Cal',
                            value: cal,
                            link: `https://escapefromtarkov.fandom.com/wiki/Special:Search?search=${encodeURIComponent(cal)}`
                        });
                    }
                    if (p.fireRate) lines.push({ label: 'RPM', value: p.fireRate });
                    if (p.ergonomics) lines.push({ label: 'Ergo', value: p.ergonomics });
                    if (p.recoilVertical) lines.push({ label: 'V.Rec', value: p.recoilVertical });
                    if (p.class) lines.push({ label: 'Class', value: p.class });
                    if (p.durability) lines.push({ label: 'Dur', value: p.durability });
                }
                return lines;
            },

            calcTotals: function(loadout) {
                let pvp = 0, pve = 0;
                for (const c of this.ALL_CATEGORIES) {
                    const it = loadout[c];
                    if (!it) continue;
                    pvp += it.avg24hPrice || 0;
                    pve += it.pvePrice || 0;
                }
                return { pvp, pve };
            },

            animateTotal: function(targetPvp, targetPve, duration = 400) {
                const pvpEl = document.getElementById('pvpTotal');
                const pveEl = document.getElementById('pveTotal');
                
                // If elements contain a spinner, treat their starting value as 0
                const startPvp = parseInt(pvpEl.textContent.replace(/\D/g, '')) || 0;
                const startPve = parseInt(pveEl.textContent.replace(/\D/g, '')) || 0;
                const startTime = performance.now();

                const update = (now) => {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    const currentPvp = Math.round(startPvp + (targetPvp - startPvp) * eased);
                    const currentPve = Math.round(startPve + (targetPve - startPve) * eased);
                    
                    pvpEl.textContent = '₽' + currentPvp.toLocaleString();
                    pveEl.textContent = '₽' + currentPve.toLocaleString();
                    
                    if (progress < 1) requestAnimationFrame(update);
                };
                requestAnimationFrame(update);
            },

            renderReels: function() {
                const container = document.getElementById('reelsContainer');
                container.innerHTML = '';
                for (const cat of this.REEL_CATS) {
                    const reel = document.createElement('div');
                    reel.className = 'reel stopped';
                    reel.dataset.category = cat;

                    const label = this.CAT_LABELS[cat] || cat;
                    const checked = this.enabledCategories[cat];

                    reel.innerHTML = `
                        <div class="reel-toggle ${checked ? 'checked' : ''}" data-category="${cat}">${checked ? '☑' : '☐'}</div>
                        <div class="cat-label">${label}</div>
                        <div class="reel-icon" id="reelIcon-${cat}"><span class="placeholder">∅</span></div>
                        <div class="reel-index">#${this.REEL_CATS.indexOf(cat)+1}</div>
                    `;
                    container.appendChild(reel);

                    // --- Bidirectional Highlight: Reel Hovering Highlights Bottom Detail Card ---
                    reel.addEventListener('mouseenter', () => {
                        const target = document.querySelector(`.loadout-item[data-category="${cat}"]`);
                        if (target) target.classList.add('highlighted');
                    });
                    reel.addEventListener('mouseleave', () => {
                        const target = document.querySelector(`.loadout-item[data-category="${cat}"]`);
                        if (target) target.classList.remove('highlighted');
                    });
                }

                // Checkbox toggle logic
                container.querySelectorAll('.reel-toggle').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation(); // Prevent trigger highlighting when checking checkbox
                        const cat = el.dataset.category;
                        if (!cat) return;
                        this.enabledCategories[cat] = !this.enabledCategories[cat];
                        const isChecked = this.enabledCategories[cat];
                        
                        el.textContent = isChecked ? '☑' : '☐';
                        el.classList.toggle('checked', isChecked);
                        
                        const reel = el.closest('.reel');
                        if (reel) reel.classList.toggle('disabled', !isChecked);
                        
                        this.updateSpinButton();
                    });
                });
                
                container.classList.remove('hidden');
            },

            updateReel: function(cat, item) {
                const iconEl = document.getElementById('reelIcon-' + cat);
                if (iconEl) iconEl.innerHTML = item ? this.getIconHtml(item) : '<span class="placeholder">∅</span>';
            },

            renderLoadout: function() {
                const grid = document.getElementById('loadoutGrid');
                const detailsPanel = document.getElementById('detailsPanel');
                let html = '';
                let hasItems = false;

                for (const cat of this.ALL_CATEGORIES) {
                    const item = this.currentLoadout[cat];
                    if (!item) continue;
                    
                    hasItems = true;
                    const label = this.CAT_LABELS[cat] || cat;
                    const stats = this.getStats(item);
                    const wikiLink = item.wikiLink || `https://escapefromtarkov.fandom.com/wiki/Special:Search?search=${encodeURIComponent(item.name)}`;

                    const statsHtml = stats.map(s => {
                        let valueDisplay = s.value;
                        if (s.link) valueDisplay = `<a href="${s.link}" target="_blank">${s.value}</a>`;
                        return `<span class="stat"><span class="stat-label">${s.label}</span> <span class="stat-value">${valueDisplay}</span></span>`;
                    }).join('');

                    html += `
                        <div class="loadout-item" data-category="${cat}">
                            <div class="li-icon">${this.getIconHtml(item)}</div>
                            <div class="li-content">
                                <div class="li-top">
                                    <a href="${wikiLink}" target="_blank" class="li-name-link" title="${item.name}">${item.name}</a>
                                </div>
                                <div class="li-cat">${label}</div>
                                ${statsHtml ? `<div class="li-stats">${statsHtml}</div>` : ''}
                            </div>
                        </div>
                    `;
                }

                // Only display breakdown list if items exist AND we are not currently shuffling waiting for the first selection
                const showDetails = hasItems && !(this.isSpinning && this.stoppedCount === 0);

                if (showDetails) {
                    detailsPanel.style.display = 'block'; // Show the bottom panel when there are items
                    grid.innerHTML = html;
                    const totals = this.calcTotals(this.currentLoadout);
                    this.animateTotal(totals.pvp, totals.pve);
                    
                    // Attach Bidirectional Highlights
                    grid.querySelectorAll('.loadout-item').forEach(el => {
                        const cat = el.dataset.category;

                        // Hover on Bottom Card Highlights Reel Slot
                        el.addEventListener('mouseenter', () => {
                            const reel = document.querySelector(`.reel[data-category="${cat}"]`);
                            if (reel) reel.classList.add('highlighted-reel');
                        });
                        el.addEventListener('mouseleave', () => {
                            const reel = document.querySelector(`.reel[data-category="${cat}"]`);
                            if (reel) reel.classList.remove('highlighted-reel');
                        });
                    });
                } else {
                    detailsPanel.style.display = 'none'; // Hide details list panel when fully cleared or actively spinning waiting for first item
                    grid.innerHTML = `
                        <div class="empty-state">
                            <span class="big">∅</span>
                            WAITING FOR ITEMS
                        </div>
                    `;
                    // Guard to ensure we don't clear the visual spinner while spinning is active
                    if (!this.isSpinning) {
                        document.getElementById('pvpTotal').textContent = '₽0';
                        document.getElementById('pveTotal').textContent = '₽0';
                    }
                }

                this.updateButtons();
            },

            performSpin: function() {
                if (this.isSpinning) return;
                
                const activeCats = this.ALL_CATEGORIES.filter(c => this.enabledCategories[c] && this.byCategory[c]?.length > 0);
                if (activeCats.length === 0) return;

                this.isSpinning = true;
                this.stoppedCount = 0;
                this.totalCats = activeCats.length;

                this.setStatus('ROLLING...', 'loading');
                this.updateButtons();

                // Display animated loading circles inside total price cards during shuffle
                document.getElementById('pvpTotal').innerHTML = '<span class="price-spinner"></span>';
                document.getElementById('pveTotal').innerHTML = '<span class="price-spinner"></span>';

                // Instantly hide details panel so previous loadout disappears immediately during spin
                document.getElementById('detailsPanel').style.display = 'none';

                // Set reels styling
                const reels = document.querySelectorAll('.reel');
                reels.forEach(r => {
                    if (activeCats.includes(r.dataset.category)) {
                        r.classList.add('spinning');
                        r.classList.remove('stopped', 'disabled');
                    }
                });

                // Clear previous non-locked active slots so they don't render prematurely on intermediate ticks
                activeCats.forEach(c => {
                    this.currentLoadout[c] = null;
                });

                // Prepare final targets
                const targetLoadout = { ...this.currentLoadout };
                activeCats.forEach(c => {
                    targetLoadout[c] = this.pick(this.byCategory[c]);
                });

                // Spin them with slightly randomized durations
                activeCats.forEach(cat => {
                    const duration = 1500 + Math.random() * 1500;
                    const stopAt = Date.now() + duration;
                    this._spinReel(cat, 40, stopAt, targetLoadout[cat], () => {
                        this.stoppedCount++;
                        this.currentLoadout[cat] = targetLoadout[cat];
                        
                        // Partial render so we see items pop in
                        this.renderLoadout();

                        if (this.stoppedCount === this.totalCats) {
                            this.finishSpin();
                        }
                    });
                });
            },

            _spinReel: function(cat, delay, stopAt, finalItem, onDone) {
                const now = Date.now();
                if (now >= stopAt) {
                    this.updateReel(cat, finalItem);
                    const reel = document.querySelector(`.reel[data-category="${cat}"]`);
                    if (reel) {
                        reel.classList.remove('spinning');
                        reel.classList.add('stopped');
                    }
                    onDone();
                    return;
                }

                const pool = this.byCategory[cat] || [];
                if (pool.length) {
                    this.updateReel(cat, this.pick(pool));
                }

                let next = delay;
                const remaining = stopAt - now;
                if (remaining < 1000) {
                    const p = 1 - (remaining / 1000);
                    next = 40 + (Math.pow(p, 3) * 200);
                }

                setTimeout(() => this._spinReel(cat, next, stopAt, finalItem, onDone), next);
            },

            finishSpin: function() {
                this.isSpinning = false;
                this.setStatus('READY', 'ready');
                this.updateButtons();
            },

            clearLoadout: function() {
                if (this.isSpinning) return;
                for (const c of this.ALL_CATEGORIES) {
                    this.currentLoadout[c] = null;
                    this.updateReel(c, null);
                }
                this.renderLoadout();
            },

            saveLoadout: function() {
                if (this.isSpinning) return;
                let lines = [
                    '=========================================',
                    ' TARKOV LOADOUT REPORT',
                    '=========================================\n'
                ];
                
                const totals = this.calcTotals(this.currentLoadout);
                lines.push(`Total PvP Value: ₽${totals.pvp.toLocaleString()}`);
                lines.push(`Total PvE Value: ₽${totals.pve.toLocaleString()}\n`);

                for (const cat of this.ALL_CATEGORIES) {
                    const item = this.currentLoadout[cat];
                    if (!item) continue;
                    
                    const label = this.CAT_LABELS[cat] || cat;
                    lines.push(`[${label.toUpperCase()}]`);
                    lines.push(`  Name: ${item.name}`);
                    lines.push(`  PvP:  ₽${(item.avg24hPrice || 0).toLocaleString()}`);
                    lines.push(`  PvE:  ₽${(item.pvePrice || 0).toLocaleString()}`);
                    lines.push('');
                }

                const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'Tarkov_Loadout.txt';
                a.click();
                URL.revokeObjectURL(a.href);
            },

            updateSpinButton: function() {
                const anyEnabled = this.ALL_CATEGORIES.some(c => this.enabledCategories[c] && this.byCategory[c]?.length > 0);
                const btn = document.getElementById('spinBtn');
                btn.disabled = !anyEnabled || this.isSpinning;
                if(this.isSpinning) btn.classList.add('loading');
                else btn.classList.remove('loading');
            },

            updateButtons: function() {
                const hasItems = Object.values(this.currentLoadout).some(i => i !== null);
                
                const saveBtn = document.getElementById('saveBtn');
                const clearBtn = document.getElementById('clearBtn');
                
                saveBtn.disabled = !hasItems || this.isSpinning;
                clearBtn.disabled = !hasItems || this.isSpinning;

                if(this.isSpinning) {
                    saveBtn.classList.add('loading');
                    clearBtn.classList.add('loading');
                } else {
                    saveBtn.classList.remove('loading');
                    clearBtn.classList.remove('loading');
                }
                
                this.updateSpinButton();
            },

            setStatus: function(text, state) {
                document.getElementById('statusText').textContent = text;
                const dot = document.getElementById('statusDot');
                dot.className = 'dot';
                if (state) dot.classList.add(state);
            },

            init: async function() {
                this.setStatus('FETCHING API...', 'loading');
                
                // Set default checked state to true for all slots, ensure initially null
                for (const c of this.ALL_CATEGORIES) {
                    this.enabledCategories[c] = true;
                    this.currentLoadout[c] = null;
                }

                try {
                    const items = await this.fetchAll();
                    this.byCategory = this.categorize(items);

                    // Check for empty data
                    if (!Object.values(this.byCategory).some(arr => arr.length > 0)) {
                        throw new Error('API returned no valid flea market items.');
                    }

                    // Render layout
                    this.renderReels();
                    
                    // Force empty state visually on reels
                    for (const c of this.ALL_CATEGORIES) {
                        this.updateReel(c, null);
                    }
                    
                    // Populate UI with clear configuration (forces details list hidden, totals 0)
                    this.renderLoadout();
                    
                    // Ready
                    this.setStatus('READY', 'ready');
                    this.updateButtons();

                } catch (err) {
                    console.error('Init error:', err);
                    this.setStatus('API ERROR', '');
                    document.getElementById('loadoutGrid').innerHTML = `
                        <div class="empty-state">
                            <span class="big">!</span>
                            FAILED TO LOAD FLEA DATA
                            <div style="margin-top:8px; font-size:12px; color:var(--text-muted);">${err.message}</div>
                        </div>
                    `;
                }

                // Bind Controls
                document.getElementById('spinBtn').addEventListener('click', () => this.performSpin());
                document.getElementById('saveBtn').addEventListener('click', () => this.saveLoadout());
                document.getElementById('clearBtn').addEventListener('click', () => this.clearLoadout());

                document.addEventListener('keydown', (e) => {
                    if (e.key === ' ' || e.key === 'Space') {
                        e.preventDefault();
                        if (!document.getElementById('spinBtn').disabled) this.performSpin();
                    }
                });
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
